; =====================================================
; Диалплан ГО-ЧС Информирование
; =====================================================

[globals]
; Глобальные переменные
GOCHS_BASE = /opt/gochs-informing
GOCHS_RECORDINGS = ${GOCHS_BASE}/recordings
GOCHS_PLAYBOOKS = ${GOCHS_BASE}/playbooks
GOCHS_VOICE = ${GOCHS_BASE}/generated_voice

; Переменные окружения
ENV = production
LOGLEVEL = notice

[default]
; Контекст по умолчанию
exten => _X.,1,NoOp(Неизвестный вызов)
 same => n,Hangup(1)

; =====================================================
; Входящие звонки от FreePBX
; =====================================================

[gochs-inbound]
; Обработка входящих звонков
exten => _X.,1,NoOp(=== ВХОДЯЩИЙ ЗВОНОК ===)
 same => n,Set(CHANNEL(language)=ru)
 same => n,Set(CALLER=${CALLERID(num)})
 same => n,Set(TIMESTAMP=${STRFTIME(${EPOCH},,%Y%m%d_%H%M%S)})
 same => n,NoOp(Звонок от: ${CALLER})
 same => n,Answer()
 same => n,Wait(1)
 
 ; Выбор активного плейбука
 same => n,Gosub(gochs-playbook,s,1)
 
 ; Запись сообщения
 same => n,Set(RECORDING_FILE=${GOCHS_RECORDINGS}/inbound/${TIMESTAMP}_${CALLER}.wav)
 same => n,MixMonitor(${RECORDING_FILE},ab)
 same => n,Playback(beep)
 same => n,Record(${RECORDING_FILE},5,300,${MAXSILENCE})
 
 ; Завершение
 same => n,Playback(vm-goodbye)
 same => n,StopMixMonitor()
 same => n,Hangup()
 
 ; Обработка ошибок
 same => n(failed),Playback(vm-sorry)
 same => n,Hangup(16)

[gochs-playbook]
; Воспроизведение приветствия
exten => s,1,NoOp(Воспроизведение плейбука)
 same => n,Set(PLAYBOOK_FILE=${GOCHS_PLAYBOOKS}/welcome)
 same => n,GotoIf($[${STAT(e,${PLAYBOOK_FILE}.wav)}]?play:tts)
 
 same => n(tts),NoOp(Использование TTS)
 same => n,Festival("Здравствуйте. Вы позвонили в систему ГО и ЧС информирования. После сигнала оставьте ваше сообщение.")
 same => n,Return()
 
 same => n(play),Playback(${PLAYBOOK_FILE})
 same => n,Return()

; =====================================================
; Исходящие звонки
; =====================================================

[gochs-outbound]
; Исходящие звонки через FreePBX
exten => _X.,1,NoOp(=== ИСХОДЯЩИЙ ЗВОНОК ===)
 same => n,Set(CHANNEL(language)=ru)
 same => n,Set(DIAL_NUMBER=${EXTEN})
 same => n,Set(CALLERID(all)=ГО-ЧС <{{FREEPBX_EXTENSION}}>)
 
 ; Выбор маршрута
 same => n,GotoIf($[${REGEX("^[0-9]{3,4}$" ${DIAL_NUMBER})}]?internal:external)
 
 ; Внутренний номер
 same => n(internal),Dial(PJSIP/${DIAL_NUMBER}@freepbx-endpoint,40,gM(gochs-answer^${SCENARIO_ID}))
 same => n,Goto(result-${DIALSTATUS})
 
 ; Внешний номер
 same => n(external),Dial(PJSIP/${DIAL_NUMBER}@freepbx-endpoint,40,gM(gochs-answer^${SCENARIO_ID}))
 same => n,Goto(result-${DIALSTATUS})
 
 ; Обработка результатов
 same => n(result-BUSY),Set(STATUS=BUSY)
 same => n,Return(${STATUS})
 
 same => n(result-NOANSWER),Set(STATUS=NOANSWER)
 same => n,Return(${STATUS})
 
 same => n(result-CONGESTION),Set(STATUS=CONGESTION)
 same => n,Return(${STATUS})
 
 same => n(result-CHANUNAVAIL),Set(STATUS=FAILED)
 same => n,Return(${STATUS})
 
 same => n(_),Set(STATUS=FAILED)
 same => n,Return(${STATUS})

; =====================================================
; Макрос ответа (воспроизведение сценария)
; =====================================================

[gochs-answer]
exten => s,1,NoOp(=== ВОСПРОИЗВЕДЕНИЕ СЦЕНАРИЯ ===)
 same => n,Set(SCENARIO_ID=${ARG1})
 same => n,Set(SCENARIO_FILE=${GOCHS_VOICE}/scenario_${SCENARIO_ID})
 
 ; Ожидание ответа
 same => n,WaitForSilence(500,1,30)
 
 ; Проверка файла сценария
 same => n,GotoIf($[${STAT(e,${SCENARIO_FILE}.wav)}]?play:check_mp3)
 same => n(check_mp3),GotoIf($[${STAT(e,${SCENARIO_FILE}.mp3)}]?play_mp3:generate)
 
 ; Воспроизведение
 same => n(play),Playback(${SCENARIO_FILE})
 same => n,Goto(end)
 
 same => n(play_mp3),MP3Player(${SCENARIO_FILE}.mp3)
 same => n,Goto(end)
 
 ; Генерация через TTS
 same => n(generate),NoOp(Генерация TTS для сценария ${SCENARIO_ID})
 same => n,System(${GOCHS_BASE}/scripts/tts_generate.sh ${SCENARIO_ID})
 same => n,Playback(${SCENARIO_FILE})
 
 same => n(end),Wait(2)
 same => n,Set(STATUS=ANSWERED)
 same => n,Return(${STATUS})

; =====================================================
; Массовый обзвон (диалер)
; =====================================================

[gochs-dialer]
; Контекст для массового обзвона
exten => dial,1,NoOp(=== ЗАПУСК ОБЗВОНА ===)
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(CONTACT_ID=${ARG2})
 same => n,Set(PHONE_NUMBER=${ARG3})
 same => n,Set(SCENARIO_ID=${ARG4})
 
 same => n,NoOp(Кампания: ${CAMPAIGN_ID}, Контакт: ${CONTACT_ID}, Номер: ${PHONE_NUMBER})
 
 ; Сохранение информации в Redis
 same => n,Set(REDIS_KEY=campaign:${CAMPAIGN_ID}:call:${CONTACT_ID})
 same => n,Set(REDIS_DATA={"status":"dialing","started":${EPOCH}})
 same => n,AGI(agi://127.0.0.1/redis_set,${REDIS_KEY},${REDIS_DATA})
 
 ; Вызов
 same => n,Set(SCENARIO_ID=${SCENARIO_ID})
 same => n,GoSub(gochs-outbound,${PHONE_NUMBER},1)
 
 ; Сохранение результата
 same => n,Set(END_TIME=${EPOCH})
 same => n,Set(REDIS_DATA={"status":"${STATUS}","ended":${END_TIME}})
 same => n,AGI(agi://127.0.0.1/redis_set,${REDIS_KEY},${REDIS_DATA})
 
 ; Отправка события через AMI
 same => n,UserEvent(CallComplete,CampaignID: ${CAMPAIGN_ID},ContactID: ${CONTACT_ID},Status: ${STATUS})
 
 same => n,Hangup()

exten => hangup,1,NoOp(=== ПРИНУДИТЕЛЬНОЕ ЗАВЕРШЕНИЕ ===)
 same => n,Set(CHANNEL_NAME=${ARG1})
 same => n,SoftHangup(${CHANNEL_NAME})
 same => n,Hangup()

; =====================================================
; API команды
; =====================================================

[gochs-api]
exten => originate,1,NoOp(=== API ORIGINATE ===)
 same => n,Set(DESTINATION=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 same => n,Set(CALL_ID=${ARG3})
 
 same => n,Originate(PJSIP/${DESTINATION}@freepbx-endpoint,exten,gochs-dialer,dial,${CALL_ID},${DESTINATION},${SCENARIO_ID},60)
 same => n,Set(RESULT=SUCCESS)
 same => n,Return(${RESULT})
 
exten => status,1,NoOp(=== API STATUS ===)
 same => n,Set(CHANNEL=${ARG1})
 same => n,ChannelStatus(${CHANNEL})
 same => n,Return(${CHANNEL_STATUS})
 
exten => channels,1,NoOp(=== API CHANNELS LIST ===)
 same => n,CoreShowChannels()
 same => n,Return()

; =====================================================
; Тестовые расширения
; =====================================================

[gochs-local]
exten => 1000,1,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()
 
exten => 2000,1,Answer()
 same => n,Echo()
 same => n,Hangup()
 
exten => echo,1,Answer()
 same => n,Echo()
 same => n,Hangup()
 
exten => test,1,Answer()
 same => n,Playback(demo-congrats)
 same => n,Wait(2)
 same => n,Hangup()

; =====================================================
; Сервисные функции
; =====================================================

[gochs-service]
exten => recording,1,NoOp(=== ВОСПРОИЗВЕДЕНИЕ ЗАПИСИ ===)
 same => n,Set(FILE=${ARG1})
 same => n,Answer()
 same => n,Playback(${GOCHS_RECORDINGS}/${FILE})
 same => n,Hangup()
 
exten => speak,1,NoOp(=== TTS ===)
 same => n,Set(TEXT=${ARG1})
 same => n,Answer()
 same => n,Festival("${TEXT}")
 same => n,Hangup()

; =====================================================
; Обработка ошибок и специальные случаи
; =====================================================

[gochs-special]
exten => failed,1,NoOp(=== ОБРАБОТКА ОШИБКИ ===)
 same => n,Playback(vm-sorry)
 same => n,Wait(1)
 same => n,Hangup(16)
 
exten => busy,1,NoOp(=== ЗАНЯТО ===)
 same => n,Busy(10)
 same => n,Hangup(17)
 
exten => congestion,1,NoOp(=== ПЕРЕГРУЗКА ===)
 same => n,Congestion(10)
 same => n,Hangup(3)
 
exten => invalid,1,NoOp(=== НЕВЕРНЫЙ НОМЕР ===)
 same => n,Playback(invalid)
 same => n,Hangup(1)

; =====================================================
; Включение дополнительных контекстов
; =====================================================

#include gochs/inbound.conf
#include gochs/outbound.conf
#include gochs/dialer.conf
