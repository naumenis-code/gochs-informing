; =====================================================
; ГО-ЧС Информирование - Массовый обзвон (Диалер)
; Версия: 1.0.0
; =====================================================

[gochs-dialer-main]
; =====================================================
; ОСНОВНОЙ КОНТЕКСТ ДИАЛЕРА
; =====================================================

; Запуск кампании обзвона
exten => start,1,NoOp(=== ЗАПУСК КАМПАНИИ ОБЗВОНА ===)
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 same => n,Set(PRIORITY=${ARG3})
 
 ; Инициализация кампании
 same => n,Gosub(gochs-dialer-init,s,1(${CAMPAIGN_ID},${SCENARIO_ID},${PRIORITY}))
 
 ; Загрузка контактов
 same => n,Gosub(gochs-dialer-load-contacts,s,1(${CAMPAIGN_ID}))
 
 ; Определение режима работы
 same => n,Gosub(gochs-dialer-mode,s,1(${CAMPAIGN_ID}))
 
 ; Запуск в зависимости от режима
 same => n,GotoIf($[${DIALER_MODE} = predictive]?predictive)
 same => n,GotoIf($[${DIALER_MODE} = power]?power)
 same => n,GotoIf($[${DIALER_MODE} = preview]?preview)
 same => n,Goto(progressive)
 
 ; =====================================================
 ; РЕЖИМЫ ОБЗВОНА
 ; =====================================================

 ; Прогрессивный режим (по умолчанию)
 same => n(progressive),NoOp(Прогрессивный режим)
 same => n,Gosub(gochs-dialer-progressive,s,1(${CAMPAIGN_ID},${SCENARIO_ID}))
 same => n,Goto(end)
 
 ; Предиктивный режим (интеллектуальный)
 same => n(predictive),NoOp(Предиктивный режим)
 same => n,Gosub(gochs-dialer-predictive,s,1(${CAMPAIGN_ID},${SCENARIO_ID}))
 same => n,Goto(end)
 
 ; Мощный режим (максимальная скорость)
 same => n(power),NoOp(Мощный режим)
 same => n,Gosub(gochs-dialer-power,s,1(${CAMPAIGN_ID},${SCENARIO_ID}))
 same => n,Goto(end)
 
 ; Предпросмотр (ручное подтверждение)
 same => n(preview),NoOp(Режим предпросмотра)
 same => n,Gosub(gochs-dialer-preview,s,1(${CAMPAIGN_ID},${SCENARIO_ID}))
 
 same => n(end),NoOp(Завершение кампании)
 same => n,Gosub(gochs-dialer-finish,s,1(${CAMPAIGN_ID}))
 same => n,Return()


[gochs-dialer-init]
; =====================================================
; ИНИЦИАЛИЗАЦИЯ КАМПАНИИ
; =====================================================

exten => s,1,NoOp(Инициализация кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 same => n,Set(PRIORITY=${IF($[${ISNULL(${ARG3})}]?5:${ARG3})})
 
 ; Установка статуса
 same => n,Set(CAMPAIGN_STATUS=initializing)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status ${CAMPAIGN_STATUS})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:scenario ${SCENARIO_ID})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:priority ${PRIORITY})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:start_time ${EPOCH})
 
 ; Инициализация счетчиков
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:total_contacts 0)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:dialed 0)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:answered 0)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:failed 0)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:active_calls 0)
 
 ; Очистка старых очередей
 same => n,System(redis-cli -a ${REDIS_PASSWORD} DEL gochs:campaign:${CAMPAIGN_ID}:queue)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} DEL gochs:campaign:${CAMPAIGN_ID}:retry)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} DEL gochs:campaign:${CAMPAIGN_ID}:retry_queue)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} DEL gochs:campaign:${CAMPAIGN_ID}:results)
 
 ; Создание события
 same => n,UserEvent(CampaignInit,CampaignID: ${CAMPAIGN_ID},ScenarioID: ${SCENARIO_ID},Priority: ${PRIORITY})
 
 same => n,Return()


[gochs-dialer-load-contacts]
; =====================================================
; ЗАГРУЗКА КОНТАКТОВ В ОЧЕРЕДЬ
; =====================================================

exten => s,1,NoOp(Загрузка контактов для кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 
 ; Получение списка групп из БД
 same => n,Set(GROUPS=${SHELL(redis-cli -a ${REDIS_PASSWORD} SMEMBERS gochs:campaign:${CAMPAIGN_ID}:groups)})
 
 ; Загрузка контактов из каждой группы
 same => n,Set(TOTAL_CONTACTS=0)
 same => n(load-loop),NoOp(Загрузка группы)
 same => n,Set(GROUP=${POP(GROUPS)})
 same => n,GotoIf($[${ISNULL(${GROUP})}]?done)
 
 ; Получение контактов группы
 same => n,Set(CONTACTS=${SHELL(redis-cli -a ${REDIS_PASSWORD} SMEMBERS gochs:group:${GROUP}:contacts)})
 
 ; Добавление в очередь
 same => n(contact-loop),NoOp(Добавление контакта)
 same => n,Set(CONTACT_ID=${POP(CONTACTS)})
 same => n,GotoIf($[${ISNULL(${CONTACT_ID})}]?load-loop)
 
 ; Проверка активности контакта
 same => n,Set(IS_ACTIVE=${SHELL(redis-cli -a ${REDIS_PASSWORD} HGET gochs:contact:${CONTACT_ID} is_active)})
 same => n,GotoIf($["${IS_ACTIVE}" != "1"]?contact-loop)
 
 ; Получение номера телефона
 same => n,Set(PHONE=${SHELL(redis-cli -a ${REDIS_PASSWORD} HGET gochs:contact:${CONTACT_ID} mobile_number)})
 same => n,GotoIf($[${ISNULL(${PHONE})}]?try-internal)
 same => n,Goto(add-to-queue)
 
 same => n(try-internal),Set(PHONE=${SHELL(redis-cli -a ${REDIS_PASSWORD} HGET gochs:contact:${CONTACT_ID} internal_number)})
 same => n,GotoIf($[${ISNULL(${PHONE})}]?contact-loop)
 
 ; Добавление в очередь
 same => n(add-to-queue),NoOp(Добавление ${CONTACT_ID}:${PHONE})
 same => n,Set(QUEUE_ITEM=${CONTACT_ID}|${PHONE})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} RPUSH gochs:campaign:${CAMPAIGN_ID}:queue "${QUEUE_ITEM}")
 same => n,Set(TOTAL_CONTACTS=$[${TOTAL_CONTACTS} + 1])
 same => n,Goto(contact-loop)
 
 same => n(done),NoOp(Загружено ${TOTAL_CONTACTS} контактов)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:total_contacts ${TOTAL_CONTACTS})
 same => n,UserEvent(CampaignLoaded,CampaignID: ${CAMPAIGN_ID},TotalContacts: ${TOTAL_CONTACTS})
 
 same => n,Return()


[gochs-dialer-mode]
; =====================================================
; ОПРЕДЕЛЕНИЕ РЕЖИМА РАБОТЫ ДИАЛЕРА
; =====================================================

exten => s,1,NoOp(Определение режима для кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 
 ; Получение настроек кампании
 same => n,Set(DIALER_MODE=${SHELL(redis-cli -a ${REDIS_PASSWORD} HGET gochs:campaign:${CAMPAIGN_ID}:config dialer_mode)})
 same => n,GotoIf($[${ISNULL(${DIALER_MODE})}]?default-mode)
 same => n,Return()
 
 same => n(default-mode),NoOp(Использование режима по умолчанию)
 same => n,Set(DIALER_MODE=progressive)
 
 ; Адаптивный выбор режима
 same => n,Set(TOTAL_CONTACTS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:total_contacts)})
 
 same => n,GotoIf($[${TOTAL_CONTACTS} < 50]?set-preview)
 same => n,GotoIf($[${TOTAL_CONTACTS} > 500]?set-power)
 same => n,Goto(set-progressive)
 
 same => n(set-preview),Set(DIALER_MODE=preview)
 same => n,Return()
 
 same => n(set-power),Set(DIALER_MODE=power)
 same => n,Return()
 
 same => n(set-progressive),Set(DIALER_MODE=progressive)
 same => n,Return()


[gochs-dialer-progressive]
; =====================================================
; ПРОГРЕССИВНЫЙ РЕЖИМ ОБЗВОНА
; =====================================================

exten => s,1,NoOp(Прогрессивный обзвон кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 
 ; Установка параметров
 same => n,Set(MAX_ACTIVE_CALLS=20)
 same => n,Set(DIAL_DELAY=500)
 same => n,Set(STATUS_CHECK_INTERVAL=5)
 
 ; Обновление статуса
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status running)
 same => n,UserEvent(CampaignStarted,CampaignID: ${CAMPAIGN_ID},Mode: progressive,MaxCalls: ${MAX_ACTIVE_CALLS})
 
 ; Основной цикл обзвона
 same => n(dial-loop),NoOp(Цикл обзвона)
 
 ; Проверка статуса кампании
 same => n,Set(STATUS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:status)})
 same => n,GotoIf($["${STATUS}" = "stopped"]?stopped)
 same => n,GotoIf($["${STATUS}" = "paused"]?paused)
 
 ; Проверка активных звонков
 same => n,Set(ACTIVE_CALLS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:active_calls)})
 same => n,GotoIf($[${ACTIVE_CALLS} >= ${MAX_ACTIVE_CALLS}]?wait)
 
 ; Получение следующего контакта
 same => n,Set(CONTACT=${SHELL(redis-cli -a ${REDIS_PASSWORD} LPOP gochs:campaign:${CAMPAIGN_ID}:queue)})
 same => n,GotoIf($[${ISNULL(${CONTACT})}]?check-retry)
 
 ; Запуск звонка
 same => n,Gosub(gochs-dialer-make-call,s,1(${CAMPAIGN_ID},${SCENARIO_ID},${CONTACT}))
 
 ; Пауза между звонками
 same => n,Wait(0.${DIAL_DELAY})
 same => n,Goto(dial-loop)
 
 same => n(wait),NoOp(Ожидание освобождения каналов)
 same => n,Wait(1)
 same => n,Goto(dial-loop)
 
 same => n(check-retry),NoOp(Проверка очереди повторов)
 same => n,Set(HAS_RETRY=${SHELL(redis-cli -a ${REDIS_PASSWORD} EXISTS gochs:campaign:${CAMPAIGN_ID}:retry)})
 same => n,GotoIf($[${HAS_RETRY} = 0]?check-complete)
 
 ; Обработка повторов с учетом времени
 same => n,Set(NOW=${EPOCH})
 same => n,Set(RETRY_ITEM=${SHELL(redis-cli -a ${REDIS_PASSWORD} ZRANGEBYSCORE gochs:campaign:${CAMPAIGN_ID}:retry_queue 0 ${NOW} LIMIT 0 1)})
 same => n,GotoIf($[${ISNULL(${RETRY_ITEM})}]?check-complete)
 
 ; Перемещение в основную очередь
 same => n,System(redis-cli -a ${REDIS_PASSWORD} ZREM gochs:campaign:${CAMPAIGN_ID}:retry_queue "${RETRY_ITEM}")
 same => n,System(redis-cli -a ${REDIS_PASSWORD} RPUSH gochs:campaign:${CAMPAIGN_ID}:queue "${RETRY_ITEM}")
 same => n,Goto(dial-loop)
 
 same => n(check-complete),NoOp(Проверка завершения)
 same => n,Set(QUEUE_SIZE=${SHELL(redis-cli -a ${REDIS_PASSWORD} LLEN gochs:campaign:${CAMPAIGN_ID}:queue)})
 same => n,Set(RETRY_SIZE=${SHELL(redis-cli -a ${REDIS_PASSWORD} ZCARD gochs:campaign:${CAMPAIGN_ID}:retry_queue)})
 same => n,GotoIf($[${ACTIVE_CALLS} > 0]?wait-active)
 same => n,GotoIf($[${QUEUE_SIZE} > 0]?dial-loop)
 same => n,GotoIf($[${RETRY_SIZE} > 0]?check-retry)
 same => n,Goto(completed)
 
 same => n(wait-active),NoOp(Ожидание активных звонков)
 same => n,Wait(${STATUS_CHECK_INTERVAL})
 same => n,Goto(check-complete)
 
 same => n(paused),NoOp(Кампания на паузе)
 same => n,Wait(${STATUS_CHECK_INTERVAL})
 same => n,Goto(dial-loop)
 
 same => n(stopped),NoOp(Кампания остановлена)
 same => n,Goto(finish)
 
 same => n(completed),NoOp(Кампания завершена)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status completed)
 
 same => n(finish),Return()


[gochs-dialer-predictive]
; =====================================================
; ПРЕДИКТИВНЫЙ РЕЖИМ ОБЗВОНА
; =====================================================

exten => s,1,NoOp(Предиктивный обзвон кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 
 ; Начальные параметры
 same => n,Set(BASE_CALLS=10)
 same => n,Set(MAX_CALLS=30)
 same => n,Set(CURRENT_CALLS=${BASE_CALLS})
 same => n,Set(ANSWER_RATE=50)
 same => n,Set(DROP_RATE_THRESHOLD=3)
 
 ; Статистика для адаптации
 same => n,Set(TOTAL_DIALED=0)
 same => n,Set(TOTAL_ANSWERED=0)
 same => n,Set(TOTAL_DROPPED=0)
 
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status running)
 same => n,UserEvent(CampaignStarted,CampaignID: ${CAMPAIGN_ID},Mode: predictive)
 
 same => n(dial-loop),NoOp(Адаптивный цикл обзвона)
 
 ; Проверка статуса
 same => n,Set(STATUS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:status)})
 same => n,GotoIf($["${STATUS}" != "running"]?status-changed)
 
 ; Расчет оптимального количества звонков
 same => n,Set(ACTIVE_CALLS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:active_calls)})
 same => n,Set(AVAILABLE_SLOTS=$[${CURRENT_CALLS} - ${ACTIVE_CALLS}])
 
 ; Адаптация на основе статистики
 same => n,GotoIf($[${TOTAL_DIALED} >= 100]?adapt)
 same => n,Goto(start-calls)
 
 same => n(adapt),NoOp(Адаптация параметров)
 same => n,Set(ANSWER_RATE=$[${TOTAL_ANSWERED} * 100 / ${TOTAL_DIALED}])
 same => n,Set(DROP_RATE=$[${TOTAL_DROPPED} * 100 / ${TOTAL_DIALED}])
 
 ; Увеличение при хорошей дозваниваемости
 same => n,GotoIf($[${ANSWER_RATE} > 60]?increase)
 same => n,GotoIf($[${ANSWER_RATE} < 30]?decrease)
 same => n,Goto(start-calls)
 
 same => n(increase),NoOp(Увеличение количества звонков)
 same => n,Set(CURRENT_CALLS=$[${CURRENT_CALLS} + 5])
 same => n,GotoIf($[${CURRENT_CALLS} > ${MAX_CALLS}]?cap-max)
 same => n,Goto(start-calls)
 
 same => n(cap-max),Set(CURRENT_CALLS=${MAX_CALLS})
 same => n,Goto(start-calls)
 
 same => n(decrease),NoOp(Уменьшение количества звонков)
 same => n,Set(CURRENT_CALLS=$[${CURRENT_CALLS} - 3])
 same => n,GotoIf($[${CURRENT_CALLS} < 5]?cap-min)
 same => n,Goto(start-calls)
 
 same => n(cap-min),Set(CURRENT_CALLS=5)
 
 same => n(start-calls),NoOp(Запуск звонков)
 same => n,Set(TO_DIAL=${AVAILABLE_SLOTS})
 same => n,GotoIf($[${TO_DIAL} <= 0]?wait)
 
 same => n(dial-batch),NoOp(Пакетный запуск)
 same => n,Set(CONTACT=${SHELL(redis-cli -a ${REDIS_PASSWORD} LPOP gochs:campaign:${CAMPAIGN_ID}:queue)})
 same => n,GotoIf($[${ISNULL(${CONTACT})}]?wait)
 
 same => n,Gosub(gochs-dialer-make-call,s,1(${CAMPAIGN_ID},${SCENARIO_ID},${CONTACT}))
 same => n,Set(TOTAL_DIALED=$[${TOTAL_DIALED} + 1])
 same => n,Set(TO_DIAL=$[${TO_DIAL} - 1])
 same => n,GotoIf($[${TO_DIAL} > 0]?dial-batch)
 
 same => n(wait),NoOp(Ожидание)
 same => n,Wait(1)
 same => n,Goto(dial-loop)
 
 same => n(status-changed),Return()


[gochs-dialer-power]
; =====================================================
; МОЩНЫЙ РЕЖИМ ОБЗВОНА (МАКСИМАЛЬНАЯ СКОРОСТЬ)
; =====================================================

exten => s,1,NoOp(Мощный обзвон кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 
 ; Максимальные настройки
 same => n,Set(MAX_CALLS=50)
 same => n,Set(BATCH_SIZE=10)
 same => n,Set(NO_DELAY=1)
 
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status running)
 same => n,UserEvent(CampaignStarted,CampaignID: ${CAMPAIGN_ID},Mode: power,MaxCalls: ${MAX_CALLS})
 
 same => n(dial-loop),NoOp(Максимальный обзвон)
 
 ; Проверка статуса
 same => n,Set(STATUS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:status)})
 same => n,GotoIf($["${STATUS}" != "running"]?finish)
 
 ; Проверка лимита каналов
 same => n,Set(ACTIVE_CALLS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:active_calls)})
 same => n,Set(AVAILABLE=$[${MAX_CALLS} - ${ACTIVE_CALLS}])
 same => n,GotoIf($[${AVAILABLE} <= 0]?wait)
 
 ; Массовый запуск звонков
 same => n,Set(BATCH_COUNT=0)
 same => n(batch-loop),NoOp(Пакетный запуск)
 
 same => n,Set(CONTACT=${SHELL(redis-cli -a ${REDIS_PASSWORD} LPOP gochs:campaign:${CAMPAIGN_ID}:queue)})
 same => n,GotoIf($[${ISNULL(${CONTACT})}]?check-queue)
 
 same => n,Gosub(gochs-dialer-make-call,s,1(${CAMPAIGN_ID},${SCENARIO_ID},${CONTACT}))
 same => n,Set(BATCH_COUNT=$[${BATCH_COUNT} + 1])
 same => n,GotoIf($[${BATCH_COUNT} < ${BATCH_SIZE}]?batch-loop)
 same => n,Goto(dial-loop)
 
 same => n(check-queue),NoOp(Проверка очереди)
 same => n,Set(QUEUE_EMPTY=${SHELL(redis-cli -a ${REDIS_PASSWORD} LLEN gochs:campaign:${CAMPAIGN_ID}:queue)})
 same => n,GotoIf($[${QUEUE_EMPTY} > 0]?dial-loop)
 same => n,Goto(check-complete)
 
 same => n(wait),NoOp(Ожидание)
 same => n,Wait(0.5)
 same => n,Goto(dial-loop)
 
 same => n(check-complete),NoOp(Проверка завершения)
 same => n,GotoIf($[${ACTIVE_CALLS} > 0]?wait-active)
 same => n,Goto(completed)
 
 same => n(wait-active),Wait(1)
 same => n,Goto(check-complete)
 
 same => n(completed),System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status completed)
 
 same => n(finish),Return()


[gochs-dialer-preview]
; =====================================================
; РЕЖИМ ПРЕДПРОСМОТРА (РУЧНОЕ ПОДТВЕРЖДЕНИЕ)
; =====================================================

exten => s,1,NoOp(Предпросмотр кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status preview)
 same => n,UserEvent(CampaignStarted,CampaignID: ${CAMPAIGN_ID},Mode: preview)
 
 same => n(preview-loop),NoOp(Цикл предпросмотра)
 
 ; Проверка статуса
 same => n,Set(STATUS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:status)})
 same => n,GotoIf($["${STATUS}" = "stopped"]?finish)
 
 ; Получение следующего контакта
 same => n,Set(CONTACT=${SHELL(redis-cli -a ${REDIS_PASSWORD} LPOP gochs:campaign:${CAMPAIGN_ID}:queue)})
 same => n,GotoIf($[${ISNULL(${CONTACT})}]?completed)
 
 ; Отправка на предпросмотр оператору
 same => n,UserEvent(PreviewContact,CampaignID: ${CAMPAIGN_ID},ContactData: ${CONTACT})
 
 ; Ожидание решения оператора (30 секунд)
 same => n,Set(DECISION=${SHELL(redis-cli -a ${REDIS_PASSWORD} BLPOP gochs:campaign:${CAMPAIGN_ID}:decisions 30 | tail -1)})
 
 same => n,GotoIf($["${DECISION}" = "accept"]?make-call)
 same => n,GotoIf($["${DECISION}" = "skip"]?skip-contact)
 same => n,GotoIf($["${DECISION}" = "postpone"]?postpone-contact)
 
 ; Таймаут - возврат в очередь
 same => n,System(redis-cli -a ${REDIS_PASSWORD} RPUSH gochs:campaign:${CAMPAIGN_ID}:queue "${CONTACT}")
 same => n,Goto(preview-loop)
 
 same => n(make-call),NoOp(Выполнение звонка)
 same => n,Gosub(gochs-dialer-make-call,s,1(${CAMPAIGN_ID},${SCENARIO_ID},${CONTACT}))
 same => n,Goto(preview-loop)
 
 same => n(skip-contact),NoOp(Пропуск контакта)
 same => n,UserEvent(ContactSkipped,CampaignID: ${CAMPAIGN_ID},Contact: ${CONTACT})
 same => n,Goto(preview-loop)
 
 same => n(postpone-contact),NoOp(Отложить контакт)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} RPUSH gochs:campaign:${CAMPAIGN_ID}:queue "${CONTACT}")
 same => n,Goto(preview-loop)
 
 same => n(completed),System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status completed)
 
 same => n(finish),Return()


[gochs-dialer-make-call]
; =====================================================
; ВЫПОЛНЕНИЕ ОТДЕЛЬНОГО ЗВОНКА
; =====================================================

exten => s,1,NoOp(Выполнение звонка для кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 same => n,Set(CONTACT_DATA=${ARG3})
 
 ; Извлечение данных контакта
 same => n,Set(CONTACT_ID=${CUT(CONTACT_DATA,\|,1)})
 same => n,Set(PHONE=${CUT(CONTACT_DATA,\|,2)})
 
 ; Увеличение счетчика активных звонков
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:campaign:${CAMPAIGN_ID}:active_calls)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:campaign:${CAMPAIGN_ID}:dialed)
 
 ; Запуск звонка в фоне
 same => n,Originate(PJSIP/${PHONE}@freepbx-outbound,exten,gochs-dialer-callback,call,${CAMPAIGN_ID},${CONTACT_ID},${PHONE},${SCENARIO_ID},60,a)
 
 same => n,Return()


[gochs-dialer-callback]
; =====================================================
; ОБРАБОТКА РЕЗУЛЬТАТА ЗВОНКА
; =====================================================

exten => call,1,NoOp(Обработка результата звонка)
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(CONTACT_ID=${ARG2})
 same => n,Set(PHONE=${ARG3})
 same => n,Set(SCENARIO_ID=${ARG4})
 
 ; Уменьшение счетчика активных звонков
 same => n,System(redis-cli -a ${REDIS_PASSWORD} DECR gochs:campaign:${CAMPAIGN_ID}:active_calls)
 
 ; Определение статуса
 same => n,Set(CALL_STATUS=${DIALSTATUS})
 same => n,Set(DURATION=${IF($[${ISNULL(${ANSWEREDTIME})}]?0:$[${EPOCH} - ${ANSWEREDTIME}])})
 
 ; Обновление статистики
 same => n,GotoIf($["${CALL_STATUS}" = "ANSWER"]?success)
 same => n,Goto(failed)
 
 same => n(success),NoOp(Успешный звонок)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:campaign:${CAMPAIGN_ID}:answered)
 same => n,UserEvent(CallSuccess,CampaignID: ${CAMPAIGN_ID},ContactID: ${CONTACT_ID},Phone: ${PHONE},Duration: ${DURATION})
 
 ; Воспроизведение сценария
 same => n,Gosub(gochs-dialer-play-scenario,s,1(${SCENARIO_ID}))
 same => n,Goto(save-result)
 
 same => n(failed),NoOp(Неудачный звонок: ${CALL_STATUS})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:campaign:${CAMPAIGN_ID}:failed)
 same => n,UserEvent(CallFailed,CampaignID: ${CAMPAIGN_ID},ContactID: ${CONTACT_ID},Phone: ${PHONE},Status: ${CALL_STATUS})
 
 ; Проверка необходимости повтора
 same => n,Gosub(gochs-dialer-check-retry,s,1(${CAMPAIGN_ID},${CONTACT_ID},${PHONE},${CALL_STATUS}))
 
 same => n(save-result),NoOp(Сохранение результата)
 same => n,Set(RESULT_JSON={"contact_id":"${CONTACT_ID}","phone":"${PHONE}","status":"${CALL_STATUS}","duration":${DURATION},"timestamp":${EPOCH}})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} RPUSH gochs:campaign:${CAMPAIGN_ID}:results '${RESULT_JSON}')
 
 same => n,Hangup()


[gochs-dialer-play-scenario]
; =====================================================
; ВОСПРОИЗВЕДЕНИЕ СЦЕНАРИЯ ПРИ ОТВЕТЕ
; =====================================================

exten => s,1,NoOp(Воспроизведение сценария ${ARG1})
 same => n,Set(SCENARIO_ID=${ARG1})
 
 ; Ожидание после ответа
 same => n,Wait(1)
 
 ; Воспроизведение файла сценария
 same => n,Set(SCENARIO_FILE=${GOCHS_VOICE}/scenario_${SCENARIO_ID})
 same => n,GotoIf($[${STAT(e,${SCENARIO_FILE}.wav)}]?play)
 same => n,Playback(${SCENARIO_FILE})
 
 same => n(play),NoOp(Воспроизведение завершено)
 
 ; Опционально: ожидание подтверждения
 same => n,GotoIf($[${SCENARIO_CONFIRM} = 1]?confirm)
 same => n,Return()
 
 same => n(confirm),NoOp(Ожидание нажатия клавиши)
 same => n,Playback(confirm-message)
 same => n,WaitExten(5)
 
 same => n,Return()


[gochs-dialer-check-retry]
; =====================================================
; ПРОВЕРКА НЕОБХОДИМОСТИ ПОВТОРНОГО ЗВОНКА
; =====================================================

exten => s,1,NoOp(Проверка повтора для ${ARG2})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(CONTACT_ID=${ARG2})
 same => n,Set(PHONE=${ARG3})
 same => n,Set(STATUS=${ARG4})
 
 ; Получение количества попыток
 same => n,Set(RETRY_COUNT=${SHELL(redis-cli -a ${REDIS_PASSWORD} HGET gochs:campaign:${CAMPAIGN_ID}:retries ${CONTACT_ID})})
 same => n,GotoIf($[${ISNULL(${RETRY_COUNT})}]?first-retry)
 same => n,Set(RETRY_COUNT=$[${RETRY_COUNT} + 1])
 same => n,Goto(check-limit)
 
 same => n(first-retry),Set(RETRY_COUNT=1)
 
 same => n(check-limit),NoOp(Попытка ${RETRY_COUNT} из ${MAX_RETRY_ATTEMPTS})
 same => n,GotoIf($[${RETRY_COUNT} > ${MAX_RETRY_ATTEMPTS}]?max-reached)
 
 ; Проверка статуса (повторять только для определенных)
 same => n,GotoIf($["${STATUS}" = "BUSY"]?schedule-retry)
 same => n,GotoIf($["${STATUS}" = "NOANSWER"]?schedule-retry)
 same => n,GotoIf($["${STATUS}" = "CONGESTION"]?schedule-retry)
 same => n,Goto(no-retry)
 
 same => n(schedule-retry),NoOp(Планирование повтора)
 same => n,Set(DELAY=$[${RETRY_INTERVAL} * ${RETRY_MULTIPLIER} ^ (${RETRY_COUNT} - 1)])
 same => n,Set(SCHEDULED_TIME=$[${EPOCH} + ${DELAY}])
 
 ; Сохранение в очереди повторов
 same => n,Set(RETRY_DATA=${CONTACT_ID}|${PHONE})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} ZADD gochs:campaign:${CAMPAIGN_ID}:retry_queue ${SCHEDULED_TIME} "${RETRY_DATA}")
 same => n,System(redis-cli -a ${REDIS_PASSWORD} HSET gochs:campaign:${CAMPAIGN_ID}:retries ${CONTACT_ID} ${RETRY_COUNT})
 
 same => n,UserEvent(CallRetryScheduled,CampaignID: ${CAMPAIGN_ID},ContactID: ${CONTACT_ID},RetryCount: ${RETRY_COUNT},ScheduledTime: ${SCHEDULED_TIME})
 
 same => n(no-retry),Return()
 
 same => n(max-reached),NoOp(Достигнут максимум повторов)
 same => n,UserEvent(CallRetryMaxReached,CampaignID: ${CAMPAIGN_ID},ContactID: ${CONTACT_ID})
 same => n,Return()


[gochs-dialer-control]
; =====================================================
; УПРАВЛЕНИЕ КАМПАНИЕЙ
; =====================================================

exten => pause,1,NoOp(Пауза кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status paused)
 same => n,UserEvent(CampaignPaused,CampaignID: ${CAMPAIGN_ID})
 same => n,Return()

exten => resume,1,NoOp(Возобновление кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status running)
 same => n,UserEvent(CampaignResumed,CampaignID: ${CAMPAIGN_ID})
 same => n,Return()

exten => stop,1,NoOp(Остановка кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(FORCE=${ARG2})
 
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status stopped)
 
 ; Принудительное завершение активных звонков
 same => n,GotoIf($["${FORCE}" = "force"]?force-stop)
 same => n,Goto(soft-stop)
 
 same => n(force-stop),NoOp(Принудительная остановка)
 same => n,System(asterisk -rx "channel request hangup all")
 
 same => n(soft-stop),UserEvent(CampaignStopped,CampaignID: ${CAMPAIGN_ID},Force: ${FORCE})
 same => n,Return()

exten => status,1,NoOp(Статус кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(STATUS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:status)})
 same => n,Set(TOTAL=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:total_contacts)})
 same => n,Set(DIALED=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:dialed)})
 same => n,Set(ANSWERED=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:answered)})
 same => n,Set(ACTIVE=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:active_calls)})
 
 same => n,Set(RESULT={"campaign_id":"${CAMPAIGN_ID}","status":"${STATUS}","total":${TOTAL},"dialed":${DIALED},"answered":${ANSWERED},"active_calls":${ACTIVE}})
 same => n,Return(${RESULT})


[gochs-dialer-finish]
; =====================================================
; ЗАВЕРШЕНИЕ КАМПАНИИ
; =====================================================

exten => s,1,NoOp(Завершение кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 
 ; Финальная статистика
 same => n,Set(TOTAL=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:total_contacts)})
 same => n,Set(DIALED=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:dialed)})
 same => n,Set(ANSWERED=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:answered)})
 same => n,Set(FAILED=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:failed)})
 
 ; Расчет эффективности
 same => n,Set(EFFICIENCY=$[${ANSWERED} * 100 / ${DIALED}])
 
 ; Установка времени завершения
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:end_time ${EPOCH})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status completed)
 
 ; Сохранение итогов в БД
 same => n,Set(SUMMARY_JSON={"campaign_id":"${CAMPAIGN_ID}","total":${TOTAL},"dialed":${DIALED},"answered":${ANSWERED},"failed":${FAILED},"efficiency":${EFFICIENCY}})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:summary '${SUMMARY_JSON}')
 
 ; Отправка итогового события
 same => n,UserEvent(CampaignCompleted,CampaignID: ${CAMPAIGN_ID},Total: ${TOTAL},Answered: ${ANSWERED},Efficiency: ${EFFICIENCY}%)
 
 ; Очистка временных данных (через час)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} EXPIRE gochs:campaign:${CAMPAIGN_ID}:queue 3600)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} EXPIRE gochs:campaign:${CAMPAIGN_ID}:retry_queue 3600)
 
 same => n,Return()


[gochs-dialer-stats]
; =====================================================
; СТАТИСТИКА ДИАЛЕРА
; =====================================================

exten => active,1,NoOp(Активные кампании)
 same => n,Set(CAMPAIGNS=${SHELL(redis-cli -a ${REDIS_PASSWORD} KEYS "gochs:campaign:*:status" | grep -v completed)})
 same => n,Return(${CAMPAIGNS})

exten => summary,1,NoOp(Сводка по всем кампаниям)
 same => n,Set(TODAY=${STRFTIME(${EPOCH},,%Y%m%d)})
 same => n,Set(TOTAL_CAMPAIGNS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:stats:dialer:campaigns:${TODAY})})
 same => n,Set(TOTAL_CALLS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:stats:dialer:calls:${TODAY})})
 same => n,Set(TOTAL_ANSWERED=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:stats:dialer:answered:${TODAY})})
 
 same => n,Return({"date":"${TODAY}","campaigns":${TOTAL_CAMPAIGNS},"calls":${TOTAL_CALLS},"answered":${TOTAL_ANSWERED}})


; =====================================================
; ВКЛЮЧЕНИЕ ДОПОЛНИТЕЛЬНЫХ КОНТЕКСТОВ
; =====================================================

