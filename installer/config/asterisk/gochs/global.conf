; =====================================================
; ГО-ЧС Информирование - Глобальные переменные
; Версия: 1.0.0
; =====================================================

[globals]
; =====================================================
; СИСТЕМНЫЕ ПУТИ
; =====================================================
GOCHS_BASE = /opt/gochs-informing
GOCHS_RECORDINGS = ${GOCHS_BASE}/recordings
GOCHS_RECORDINGS_INBOUND = ${GOCHS_RECORDINGS}/inbound
GOCHS_RECORDINGS_OUTBOUND = ${GOCHS_RECORDINGS}/outbound
GOCHS_PLAYBOOKS = ${GOCHS_BASE}/playbooks
GOCHS_VOICE = ${GOCHS_BASE}/generated_voice
GOCHS_LOGS = ${GOCHS_BASE}/logs
GOCHS_TEMP = /tmp/gochs

; =====================================================
; НАСТРОЙКИ ЗВОНКОВ
; =====================================================
; Таймауты (в секундах)
DIAL_TIMEOUT = 40
ANSWER_TIMEOUT = 30
RING_TIMEOUT = 60
MESSAGE_TIMEOUT = 300
SILENCE_TIMEOUT = 5
MAX_SILENCE = 3

; Повторные вызовы
MAX_RETRY_ATTEMPTS = 3
RETRY_INTERVAL = 300
RETRY_MULTIPLIER = 2
MAX_CAMPAIGN_DURATION = 3600

; Лимиты каналов
MAX_CONCURRENT_CALLS = 20
MAX_CHANNELS_PER_CAMPAIGN = 50
CHANNEL_RESERVE = 2

; =====================================================
; АУДИО НАСТРОЙКИ
; =====================================================
; Форматы записи
RECORDING_FORMAT = wav
RECORDING_SAMPLE_RATE = 8000
RECORDING_BITRATE = 64k
RECORDING_CHANNELS = 1

; Громкость
DEFAULT_VOLUME_RX = 0.0
DEFAULT_VOLUME_TX = 0.0
PLAYBACK_VOLUME = -3.0
RECORDING_VOLUME = 0.0

; Тональные сигналы
BEEP_FILE = beep
RING_FILE = ring
BUSY_FILE = busy
CONGESTION_FILE = congestion
ERROR_FILE = invalid

; =====================================================
; TTS (Text-to-Speech)
; =====================================================
TTS_ENABLED = yes
TTS_ENGINE = festival
TTS_LANGUAGE = ru
TTS_VOICE = russian
TTS_SPEED = 1.0
TTS_VOLUME = 1.0
TTS_CACHE_DIR = ${GOCHS_VOICE}/tts_cache
TTS_CACHE_ENABLED = yes
TTS_CACHE_TTL = 2592000

; =====================================================
; STT (Speech-to-Text)
; =====================================================
STT_ENABLED = yes
STT_ENGINE = vosk
STT_MODEL = ${GOCHS_BASE}/models/vosk/model-ru
STT_SAMPLE_RATE = 16000
STT_LANGUAGE = ru
STT_ALTERNATIVES = 3
STT_PHRASES_FILE = ${GOCHS_BASE}/config/phrases.txt

; =====================================================
; REDIS ИНТЕГРАЦИЯ
; =====================================================
REDIS_HOST = 127.0.0.1
REDIS_PORT = 6379
REDIS_PASSWORD = {{REDIS_PASSWORD}}
REDIS_DB_CALLS = 0
REDIS_DB_CACHE = 1
REDIS_DB_SESSIONS = 2
REDIS_DB_QUEUE = 3

; Ключи Redis
REDIS_KEY_PREFIX = gochs
REDIS_CAMPAIGN_PREFIX = ${REDIS_KEY_PREFIX}:campaign
REDIS_CALL_PREFIX = ${REDIS_KEY_PREFIX}:call
REDIS_CONTACT_PREFIX = ${REDIS_KEY_PREFIX}:contact
REDIS_SCENARIO_PREFIX = ${REDIS_KEY_PREFIX}:scenario

; =====================================================
; API ИНТЕГРАЦИЯ
; =====================================================
API_URL = http://127.0.0.1:8000
API_VERSION = v1
API_TIMEOUT = 10
API_RETRY_ATTEMPTS = 3
API_RETRY_DELAY = 1

; Webhook URLs
WEBHOOK_CALL_START = ${API_URL}/api/${API_VERSION}/webhooks/call/start
WEBHOOK_CALL_END = ${API_URL}/api/${API_VERSION}/webhooks/call/end
WEBHOOK_CALL_FAILED = ${API_URL}/api/${API_VERSION}/webhooks/call/failed
WEBHOOK_INBOUND = ${API_URL}/api/${API_VERSION}/webhooks/inbound
WEBHOOK_RECORDING = ${API_URL}/api/${API_VERSION}/webhooks/recording

; =====================================================
; FREE PBX ИНТЕГРАЦИЯ
; =====================================================
FREEPBX_ENABLED = yes
FREEPBX_HOST = {{FREEPBX_HOST}}
FREEPBX_PORT = {{FREEPBX_PORT}}
FREEPBX_EXTENSION = {{FREEPBX_EXTENSION}}
FREEPBX_CONTEXT = from-internal
FREEPBX_TRUNK = gochs-trunk
FREEPBX_REGISTRATION_RETRY = 30
FREEPBX_QUALIFY_FREQUENCY = 60

; =====================================================
; НОМЕРА И МАРШРУТИЗАЦИЯ
; =====================================================
; Префиксы
PREFIX_INTERNAL = 
PREFIX_LOCAL = 8
PREFIX_LONG_DISTANCE = 8
PREFIX_INTERNATIONAL = 810

; Форматы номеров
INTERNAL_PATTERN = ^[1-9][0-9]{2,3}$
MOBILE_PATTERN = ^(\+7|8)[0-9]{10}$
CITY_PATTERN = ^[0-9]{5,7}$

; Специальные номера
EMERGENCY_NUMBERS = 101,102,103,104,112
GOCHS_OPERATOR = 1000
GOCHS_ADMIN = 2000
GOCHS_TEST = 9999

; =====================================================
; СЦЕНАРИИ ОПОВЕЩЕНИЯ
; =====================================================
; Приоритеты (1-10, где 1 - наивысший)
PRIORITY_EMERGENCY = 1
PRIORITY_HIGH = 3
PRIORITY_NORMAL = 5
PRIORITY_LOW = 7
PRIORITY_TEST = 10

; Статусы сценариев
SCENARIO_ACTIVE = active
SCENARIO_INACTIVE = inactive
SCENARIO_ARCHIVED = archived
SCENARIO_DRAFT = draft

; Категории сценариев
CATEGORY_FIRE = fire
CATEGORY_EVACUATION = evacuation
CATEGORY_EMERGENCY = emergency
CATEGORY_TEST = test
CATEGORY_INFO = info

; =====================================================
; КАМПАНИИ ОБЗВОНА
; =====================================================
; Статусы кампаний
CAMPAIGN_PENDING = pending
CAMPAIGN_RUNNING = running
CAMPAIGN_PAUSED = paused
CAMPAIGN_COMPLETED = completed
CAMPAIGN_STOPPED = stopped
CAMPAIGN_FAILED = failed

; Режимы остановки
STOP_SOFT = soft
STOP_FORCE = force
STOP_EMERGENCY = emergency

; =====================================================
; СТАТУСЫ ЗВОНКОВ
; =====================================================
CALL_QUEUED = queued
CALL_DIALING = dialing
CALL_RINGING = ringing
CALL_ANSWERED = answered
CALL_COMPLETED = completed
CALL_BUSY = busy
CALL_NOANSWER = noanswer
CALL_FAILED = failed
CALL_CONGESTION = congestion
CALL_CANCELLED = cancelled
CALL_TIMEOUT = timeout

; =====================================================
; ВХОДЯЩИЕ ЗВОНКИ
; =====================================================
INBOUND_MAX_DURATION = 300
INBOUND_SILENCE_TIMEOUT = 5
INBOUND_BEEP_BEFORE_RECORD = yes
INBOUND_ANNOUNCE_DURATION = yes
INBOUND_ALLOW_REVIEW = yes
INBOUND_MAX_MESSAGES = 1000

; Плейбуки
PLAYBOOK_WELCOME = welcome
PLAYBOOK_BUSY = busy
PLAYBOOK_CLOSED = closed
PLAYBOOK_ERROR = error

; =====================================================
; МОНИТОРИНГ И СТАТИСТИКА
; =====================================================
; Интервалы сбора метрик (сек)
MONITOR_INTERVAL = 30
STATS_INTERVAL = 60
HEALTH_CHECK_INTERVAL = 10

; Пороги для алертов
ALERT_CHANNELS_THRESHOLD = 90
ALERT_FAILURE_RATE = 30
ALERT_RESPONSE_TIME = 5000

; Метрики
METRICS_ENABLED = yes
METRICS_PREFIX = gochs
METRICS_EXPORT_INTERVAL = 15

; =====================================================
; ЛОГИРОВАНИЕ
; =====================================================
; Уровни логирования (0-10)
LOG_LEVEL_CONSOLE = 3
LOG_LEVEL_FILE = 5
LOG_LEVEL_SYSLOG = 3

; Категории
LOG_CALLS = yes
LOG_EVENTS = yes
LOG_CDR = yes
LOG_SECURITY = yes
LOG_DEBUG = no

; Ротация логов
LOG_MAX_SIZE = 100M
LOG_ROTATE_COUNT = 10
LOG_COMPRESS = yes

; =====================================================
; БЕЗОПАСНОСТЬ
; =====================================================
; Аутентификация
AUTH_REQUIRED = yes
AUTH_METHOD = jwt
AUTH_TOKEN_EXPIRE = 3600

; Шифрование
ENCRYPT_RECORDINGS = no
ENCRYPT_SIP = no
ENCRYPT_RTP = no

; Доступ
ALLOWED_IPS = 127.0.0.1,192.168.0.0/16,10.0.0.0/8
BLOCKED_IPS = 
RATE_LIMIT_CALLS = 100
RATE_LIMIT_WINDOW = 60

; =====================================================
; ОЧИСТКА И ОБСЛУЖИВАНИЕ
; =====================================================
; Автоматическая очистка
CLEANUP_ENABLED = yes
CLEANUP_INTERVAL = 86400
CLEANUP_RECORDINGS_DAYS = 90
CLEANUP_LOGS_DAYS = 30
CLEANUP_TEMP_HOURS = 24

; Архивация
ARCHIVE_ENABLED = yes
ARCHIVE_COMPRESS = yes
ARCHIVE_FORMAT = tar.gz

; =====================================================
; РЕЗЕРВНОЕ КОПИРОВАНИЕ
; =====================================================
BACKUP_ENABLED = yes
BACKUP_SCHEDULE = 0 2 * * *
BACKUP_RETENTION_DAYS = 30
BACKUP_INCLUDE_DB = yes
BACKUP_INCLUDE_CONFIG = yes
BACKUP_INCLUDE_RECORDINGS = no

; =====================================================
; ТЕСТИРОВАНИЕ И ОТЛАДКА
; =====================================================
DEBUG_ENABLED = no
TEST_MODE = no
SIMULATE_CALLS = no
VERBOSE_LOGGING = no

; Тестовые номера
TEST_NUMBER_INTERNAL = 9999
TEST_NUMBER_MOBILE = 89161234567
TEST_SCENARIO_ID = test-scenario-001

; =====================================================
; КАСТОМНЫЕ ПЕРЕМЕННЫЕ
; =====================================================
; Здесь можно добавить специфичные для предприятия переменные
COMPANY_NAME = 
COMPANY_CODE = 
DEPARTMENT_DEFAULT = 
NOTIFICATION_EMAIL = 
EMERGENCY_CONTACT = 

; =====================================================
; ВЕРСИЯ И МЕТАДАННЫЕ
; =====================================================
CONFIG_VERSION = 1.0.0
CONFIG_DATE = {{CONFIG_DATE}}
CONFIG_AUTHOR = GOCHS Installer
SYSTEM_ID = gochs-pbx-001
ENVIRONMENT = production

; =====================================================
; ИМПОРТ ДОПОЛНИТЕЛЬНЫХ ПЕРЕМЕННЫХ
; =====================================================
; #include gochs/custom.conf
