; =====================================================
; ГО-ЧС Информирование - Обработка входящих звонков
; Версия: 1.0.0
; =====================================================

[gochs-inbound-main]
; =====================================================
; ОСНОВНОЙ КОНТЕКСТ ВХОДЯЩИХ ЗВОНКОВ
; =====================================================

; Входящий звонок от FreePBX
exten => _X.,1,NoOp(=== ВХОДЯЩИЙ ЗВОНОК ГО-ЧС ===)
 same => n,Set(CHANNEL(language)=ru)
 same => n,Set(CALLER_NUM=${CALLERID(num)})
 same => n,Set(CALLER_NAME=${CALLERID(name)})
 same => n,Set(TIMESTAMP=${STRFTIME(${EPOCH},,%Y%m%d_%H%M%S)})
 same => n,Set(CALL_ID=${UNIQUEID})
 
 ; Проверка Caller ID
 same => n,GotoIf($[${ISNULL(${CALLER_NUM})}]?no-callerid)
 same => n,GotoIf($[${LEN(${CALLER_NUM})} < 3]?invalid-callerid)
 
 ; Логирование
 same => n,NoOp(Входящий от: ${CALLER_NAME} <${CALLER_NUM}>)
 same => n,UserEvent(InboundCall,CallerID: ${CALLER_NUM},CallerName: ${CALLER_NAME},CallID: ${CALL_ID})
 
 ; Проверка черного списка
 same => n,Gosub(gochs-inbound-blacklist,s,1(${CALLER_NUM}))
 same => n,GotoIf($[${GOSUB_RETVAL} = 1]?blacklisted)
 
 ; Проверка рабочего времени
 same => n,Gosub(gochs-inbound-schedule,s,1)
 same => n,GotoIf($[${GOSUB_RETVAL} = 0]?after-hours)
 
 ; Определение языка по префиксу
 same => n,Gosub(gochs-inbound-language,s,1(${CALLER_NUM}))
 
 ; Ответ на звонок
 same => n,Answer()
 same => n,Wait(1)
 
 ; Воспроизведение приветствия
 same => n,Gosub(gochs-inbound-playbook,s,1(welcome))
 
 ; Запись сообщения
 same => n,Gosub(gochs-inbound-record,s,1)
 
 ; Завершение
 same => n,Playback(vm-goodbye)
 same => n,UserEvent(InboundComplete,CallID: ${CALL_ID},Status: success,Duration: ${REC_DURATION})
 same => n,Hangup()
 
 ; =====================================================
 ; Обработчики ошибок и особых случаев
 ; =====================================================
 
 ; Нет Caller ID
 same => n(no-callerid),NoOp(Звонок без Caller ID)
 same => n,Answer()
 same => n,Playback(anonymous-call-reject)
 same => n,UserEvent(InboundRejected,Reason: no-callerid)
 same => n,Hangup(21)
 
 ; Неверный Caller ID
 same => n(invalid-callerid),NoOp(Неверный Caller ID: ${CALLER_NUM})
 same => n,Answer()
 same => n,Playback(invalid)
 same => n,UserEvent(InboundRejected,Reason: invalid-callerid)
 same => n,Hangup(21)
 
 ; Черный список
 same => n(blacklisted),NoOp(Номер в черном списке: ${CALLER_NUM})
 same => n,Answer()
 same => n,Playback(not-authorized)
 same => n,UserEvent(InboundRejected,Reason: blacklisted)
 same => n,Hangup(21)
 
 ; Нерабочее время
 same => n(after-hours),NoOp(Звонок в нерабочее время)
 same => n,Answer()
 same => n,Gosub(gochs-inbound-playbook,s,1(after-hours))
 same => n,Goto(record-message)
 
 ; Ошибка записи
 same => n(record-error),NoOp(Ошибка записи)
 same => n,Playback(vm-sorry)
 same => n,UserEvent(InboundError,CallID: ${CALL_ID},Error: record-failed)
 same => n,Hangup(16)


[gochs-inbound-blacklist]
; =====================================================
; ПРОВЕРКА ЧЕРНОГО СПИСКА
; =====================================================

exten => s,1,NoOp(Проверка черного списка: ${ARG1})
 same => n,Set(CALLER=${ARG1})
 
 ; Проверка в Redis
 same => n,Set(RESULT=${SHELL(redis-cli -a ${REDIS_PASSWORD} SISMEMBER gochs:blacklist ${CALLER})})
 
 ; Проверка в локальном файле
 same => n,GotoIf($[${RESULT} = 1]?blocked)
 same => n,Set(FILE_RESULT=${SHELL(grep -c "^${CALLER}$" ${GOCHS_BASE}/config/blacklist.txt)})
 same => n,GotoIf($[${FILE_RESULT} > 0]?blocked)
 
 ; Номер не заблокирован
 same => n,Return(0)
 
 same => n(blocked),NoOp(Номер ${CALLER} заблокирован)
 same => n,Return(1)


[gochs-inbound-schedule]
; =====================================================
; ПРОВЕРКА РАБОЧЕГО ВРЕМЕНИ
; =====================================================

exten => s,1,NoOp(Проверка рабочего времени)
 same => n,Set(CURRENT_TIME=${STRFTIME(${EPOCH},,%H%M)})
 same => n,Set(CURRENT_DAY=${STRFTIME(${EPOCH},,%u)})
 
 ; Проверка выходных дней
 same => n,GotoIf($[${CURRENT_DAY} > 5]?holiday-check)
 
 ; Проверка рабочего времени
 same => n,GotoIf($[${CURRENT_TIME} < 0900]?after-hours)
 same => n,GotoIf($[${CURRENT_TIME} > 2100]?after-hours)
 
 ; Рабочее время
 same => n,Return(1)
 
 same => n(holiday-check),NoOp(Проверка праздничных дней)
 ; Проверка через файл праздников
 same => n,Set(TODAY=${STRFTIME(${EPOCH},,%Y%m%d)})
 same => n,Set(IS_HOLIDAY=${SHELL(grep -c "^${TODAY}" ${GOCHS_BASE}/config/holidays.txt)})
 same => n,GotoIf($[${IS_HOLIDAY} > 0]?after-hours)
 same => n,Return(1)
 
 same => n(after-hours),NoOp(Нерабочее время)
 same => n,Return(0)


[gochs-inbound-language]
; =====================================================
; ОПРЕДЕЛЕНИЕ ЯЗЫКА
; =====================================================

exten => s,1,NoOp(Определение языка для: ${ARG1})
 same => n,Set(CALLER=${ARG1})
 
 ; По умолчанию русский
 same => n,Set(LANG=ru)
 
 ; Проверка международных номеров
 same => n,GotoIf($[${CALLER:0:3} = "+1 "]?lang-en)
 same => n,GotoIf($[${CALLER:0:3} = "+44"]?lang-en)
 same => n,GotoIf($[${CALLER:0:3} = "+49"]?lang-de)
 
 ; Установка языка
 same => n,Set(CHANNEL(language)=${LANG})
 same => n,Return()
 
 same => n(lang-en),Set(LANG=en)
 same => n,Set(CHANNEL(language)=en)
 same => n,Return()
 
 same => n(lang-de),Set(LANG=de)
 same => n,Set(CHANNEL(language)=de)
 same => n,Return()


[gochs-inbound-playbook]
; =====================================================
; ВОСПРОИЗВЕДЕНИЕ ПЛЕЙБУКА (ПРИВЕТСТВИЯ)
; =====================================================

exten => s,1,NoOp(Воспроизведение плейбука: ${ARG1})
 same => n,Set(PLAYBOOK_TYPE=${ARG1})
 same => n,Set(PLAYBOOK_FILE=${GOCHS_PLAYBOOKS}/${PLAYBOOK_TYPE}_${CHANNEL(language)})
 
 ; Проверка наличия файла
 same => n,GotoIf($[${STAT(e,${PLAYBOOK_FILE}.wav)}]?play-wav)
 same => n,GotoIf($[${STAT(e,${PLAYBOOK_FILE}.mp3)}]?play-mp3)
 same => n,GotoIf($[${STAT(e,${PLAYBOOK_FILE}.ulaw)}]?play-ulaw)
 
 ; Генерация через TTS если файл не найден
 same => n,Goto(tts-generate)
 
 ; Воспроизведение файлов
 same => n(play-wav),Playback(${PLAYBOOK_FILE})
 same => n,Goto(done)
 
 same => n(play-mp3),MP3Player(${PLAYBOOK_FILE}.mp3)
 same => n,Goto(done)
 
 same => n(play-ulaw),Playback(${PLAYBOOK_FILE})
 same => n,Goto(done)
 
 ; Генерация TTS
 same => n(tts-generate),NoOp(Генерация TTS для ${PLAYBOOK_TYPE})
 same => n,Gosub(gochs-tts-generate,s,1(${PLAYBOOK_TYPE},${CHANNEL(language)}))
 same => n,Playback(${PLAYBOOK_FILE})
 
 same => n(done),Return()


[gochs-inbound-record]
; =====================================================
; ЗАПИСЬ ВХОДЯЩЕГО СООБЩЕНИЯ
; =====================================================

exten => s,1,NoOp(Запись входящего сообщения)
 same => n,Set(REC_FILE=${GOCHS_RECORDINGS_INBOUND}/${TIMESTAMP}_${CALLER_NUM}_${CALL_ID})
 
 ; Сигнал начала записи
 same => n,Playback(beep)
 
 ; Начало записи
 same => n,MixMonitor(${REC_FILE}.${RECORDING_FORMAT},ab)
 same => n,Set(REC_START=${EPOCH})
 
 ; Запись с детекцией тишины
 same => n,Record(${REC_FILE}.${RECORDING_FORMAT},${SILENCE_TIMEOUT},${INBOUND_MAX_DURATION},${MAX_SILENCE})
 
 ; Завершение записи
 same => n,Set(REC_END=${EPOCH})
 same => n,Set(REC_DURATION=$[${REC_END} - ${REC_START}])
 same => n,StopMixMonitor()
 
 ; Проверка длительности
 same => n,GotoIf($[${REC_DURATION} < 2]?too-short)
 
 ; Отправка на распознавание речи
 same => n,Gosub(gochs-inbound-transcribe,s,1(${REC_FILE}.${RECORDING_FORMAT}))
 
 ; Сохранение в базу данных
 same => n,Gosub(gochs-inbound-save,s,1(${REC_FILE}.${RECORDING_FORMAT},${REC_DURATION}))
 
 ; Предложение прослушать
 same => n,Playback(vm-review)
 same => n,WaitExten(3)
 
 same => n,Return()
 
 ; Слишком короткое сообщение
 same => n(too-short),NoOp(Слишком короткое сообщение: ${REC_DURATION} сек)
 same => n,Playback(vm-tooshort)
 same => n,Return()


[gochs-inbound-transcribe]
; =====================================================
; РАСПОЗНАВАНИЕ РЕЧИ (STT)
; =====================================================

exten => s,1,NoOp(Распознавание речи: ${ARG1})
 same => n,Set(AUDIO_FILE=${ARG1})
 
 ; Проверка включен ли STT
 same => n,GotoIf($[${STT_ENABLED} = no]?skip)
 
 ; Конвертация в нужный формат для Vosk
 same => n,Set(TEMP_WAV=/tmp/gochs_stt_${CALL_ID}.wav)
 same => n,System(sox ${AUDIO_FILE} -r ${STT_SAMPLE_RATE} -c 1 -b 16 ${TEMP_WAV})
 
 ; Запуск распознавания
 same => n,Set(TRANSCRIPT=${SHELL(${GOCHS_BASE}/scripts/stt_transcribe.sh ${TEMP_WAV} ${STT_LANGUAGE})})
 
 ; Очистка временного файла
 same => n,System(rm -f ${TEMP_WAV})
 
 ; Сохранение транскрипции
 same => n,Set(TRANSCRIPT_FILE=${AUDIO_FILE}.txt)
 same => n,System(echo "${TRANSCRIPT}" > ${TRANSCRIPT_FILE})
 
 same => n(skip),Return()


[gochs-inbound-save]
; =====================================================
; СОХРАНЕНИЕ ИНФОРМАЦИИ О ЗВОНКЕ В БД
; =====================================================

exten => s,1,NoOp(Сохранение в БД)
 same => n,Set(RECORDING_FILE=${ARG1})
 same => n,Set(DURATION=${ARG2})
 
 ; Формирование JSON
 same => n,Set(JSON_DATA={"caller_number":"${CALLER_NUM}","caller_name":"${CALLER_NAME}","recording_file":"${RECORDING_FILE}","duration":${DURATION},"timestamp":"${TIMESTAMP}","call_id":"${CALL_ID}"})
 
 ; Отправка через API
 same => n,Set(CURL_CMD=curl -X POST ${API_URL}/api/${API_VERSION}/inbound/calls \
   -H "Content-Type: application/json" \
   -H "Authorization: Bearer ${API_TOKEN}" \
   -d '${JSON_DATA}')
   
 same => n,System(${CURL_CMD})
 
 ; Сохранение в Redis для быстрого доступа
 same => n,Set(REDIS_KEY=gochs:inbound:${CALL_ID})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SETEX ${REDIS_KEY} 3600 '${JSON_DATA}')
 
 same => n,Return()


[gochs-inbound-menu]
; =====================================================
; ГОЛОСОВОЕ МЕНЮ ПОСЛЕ ЗАПИСИ
; =====================================================

exten => 1,1,NoOp(Прослушать запись)
 same => n,Playback(${REC_FILE})
 same => n,Goto(s,1)
 
exten => 2,1,NoOp(Перезаписать сообщение)
 same => n,System(rm -f ${REC_FILE}.*)
 same => n,Goto(gochs-inbound-record,s,1)
 
exten => 3,1,NoOp(Отправить сообщение)
 same => n,Playback(vm-saved)
 same => n,Hangup()
 
exten => i,1,NoOp(Неверный ввод)
 same => n,Playback(invalid)
 same => n,Wait(1)
 same => n,Goto(s,1)
 
exten => t,1,NoOp(Таймаут)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()


[gochs-inbound-special]
; =====================================================
; СПЕЦИАЛЬНЫЕ НОМЕРА
; =====================================================

; Экстренный вызов оператора
exten => 0,1,NoOp(Вызов оператора)
 same => n,Answer()
 same => n,Playback(pls-wait-connect-op)
 same => n,Dial(PJSIP/${GOCHS_OPERATOR}@freepbx-endpoint,30)
 same => n,Hangup()

; Прослушать тестовое сообщение
exten => 999,1,NoOp(Тестовый звонок)
 same => n,Answer()
 same => n,Playback(demo-congrats)
 same => n,Echo()
 same => n,Hangup()

; Информация о системе
exten => 100,1,NoOp(Информация о системе)
 same => n,Answer()
 same => n,Playback(system-version)
 same => n,SayNumber(${ASTERISK_VERSION})
 same => n,Hangup()


[gochs-tts-generate]
; =====================================================
; ГЕНЕРАЦИЯ TTS ДЛЯ ПЛЕЙБУКОВ
; =====================================================

exten => s,1,NoOp(Генерация TTS: ${ARG1} на языке ${ARG2})
 same => n,Set(PLAYBOOK_TYPE=${ARG1})
 same => n,Set(LANG=${ARG2})
 
 ; Получение текста плейбука из БД
 same => n,Set(TEXT=${SHELL(${GOCHS_BASE}/scripts/get_playbook_text.sh ${PLAYBOOK_TYPE} ${LANG})})
 
 ; Если текст не найден, использовать стандартный
 same => n,GotoIf($[${ISNULL(${TEXT})}]?default-text)
 same => n,Goto(generate)
 
 same => n(default-text),NoOp(Использование стандартного текста)
 same => n,Gosub(gochs-tts-default-text,s,1(${PLAYBOOK_TYPE},${LANG}))
 
 same => n(generate),NoOp(Генерация аудио через Festival)
 same => n,Set(OUTPUT_FILE=${GOCHS_PLAYBOOKS}/${PLAYBOOK_TYPE}_${LANG})
 same => n,System(echo "${TEXT}" | text2wave -o ${OUTPUT_FILE}.wav)
 
 ; Конвертация в другие форматы
 same => n,System(sox ${OUTPUT_FILE}.wav ${OUTPUT_FILE}.ulaw)
 same => n,System(lame ${OUTPUT_FILE}.wav ${OUTPUT_FILE}.mp3)
 
 same => n,Return()


[gochs-tts-default-text]
; =====================================================
; СТАНДАРТНЫЕ ТЕКСТЫ ДЛЯ TTS
; =====================================================

exten => s,1,NoOp(Стандартный текст для ${ARG1})
 same => n,Set(TYPE=${ARG1})
 same => n,Set(LANG=${ARG2})
 
 ; Русские тексты
 same => n,GotoIf($["${LANG}" = "ru"]?ru-texts)
 ; Английские тексты
 same => n,GotoIf($["${LANG}" = "en"]?en-texts)
 
 same => n(ru-texts),NoOp(Русские тексты)
 same => n,GotoIf($["${TYPE}" = "welcome"]?ru-welcome)
 same => n,GotoIf($["${TYPE}" = "after-hours"]?ru-afterhours)
 same => n,GotoIf($["${TYPE}" = "busy"]?ru-busy)
 same => n,Set(TEXT=Здравствуйте. Оставьте сообщение после сигнала.)
 same => n,Return()
 
 same => n(ru-welcome),Set(TEXT=Здравствуйте. Вы позвонили в систему ГО и ЧС информирования предприятия. После звукового сигнала оставьте ваше сообщение. Спасибо.)
 same => n,Return()
 
 same => n(ru-afterhours),Set(TEXT=Здравствуйте. Вы позвонили в нерабочее время. Вы можете оставить сообщение после сигнала, и мы свяжемся с вами в ближайшее рабочее время.)
 same => n,Return()
 
 same => n(ru-busy),Set(TEXT=Извините, все операторы заняты. Пожалуйста, оставьте сообщение после сигнала.)
 same => n,Return()
 
 same => n(en-texts),NoOp(Английские тексты)
 same => n,GotoIf($["${TYPE}" = "welcome"]?en-welcome)
 same => n,Set(TEXT=Hello. Please leave your message after the beep.)
 same => n,Return()
 
 same => n(en-welcome),Set(TEXT=Hello. You have reached the emergency notification system. Please leave your message after the beep. Thank you.)
 same => n,Return()


[gochs-inbound-notify]
; =====================================================
; УВЕДОМЛЕНИЯ О ВХОДЯЩИХ ЗВОНКАХ
; =====================================================

exten => s,1,NoOp(Отправка уведомлений)
 same => n,Set(MESSAGE="Новое входящее сообщение от ${CALLER_NUM} (${CALLER_NAME})")
 
 ; Email уведомление
 same => n,GotoIf($[${NOTIFICATION_EMAIL} = ]?skip-email)
 same => n,System(echo "${MESSAGE}" | mail -s "ГО-ЧС: Новое сообщение" ${NOTIFICATION_EMAIL})
 
 same => n(skip-email),NoOp(Email уведомление пропущено)
 
 ; Telegram уведомление
 same => n,GotoIf($[${TELEGRAM_ENABLED} = no]?skip-telegram)
 same => n,System(${GOCHS_BASE}/scripts/telegram_notify.sh "${MESSAGE}")
 
 same => n(skip-telegram),NoOp(Telegram уведомление пропущено)
 
 ; SMS уведомление
 same => n,GotoIf($[${SMS_ENABLED} = no]?skip-sms)
 same => n,System(${GOCHS_BASE}/scripts/sms_notify.sh "${EMERGENCY_CONTACT}" "${MESSAGE}")
 
 same => n(skip-sms),Return()


[gochs-inbound-stats]
; =====================================================
; СТАТИСТИКА ВХОДЯЩИХ ЗВОНКОВ
; =====================================================

exten => s,1,NoOp(Обновление статистики)
 same => n,Set(TODAY=${STRFTIME(${EPOCH},,%Y%m%d)})
 same => n,Set(HOUR=${STRFTIME(${EPOCH},,%H)})
 
 ; Инкремент счетчиков в Redis
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:stats:inbound:total:${TODAY})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:stats:inbound:hour:${TODAY}:${HOUR})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} EXPIRE gochs:stats:inbound:hour:${TODAY}:${HOUR} 2592000)
 
 ; Длительность записей
 same => n,GotoIf($[${REC_DURATION} > 0]?add-duration)
 same => n,Return()
 
 same => n(add-duration),NoOp(Добавление длительности)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCRBY gochs:stats:inbound:duration:${TODAY} ${REC_DURATION})
 
 same => n,Return()


; =====================================================
