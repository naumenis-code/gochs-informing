; =====================================================
; ГО-ЧС Информирование - Исходящие звонки
; Версия: 1.0.0
; =====================================================

[gochs-outbound-main]
; =====================================================
; ОСНОВНОЙ КОНТЕКСТ ИСХОДЯЩИХ ЗВОНКОВ
; =====================================================

; Исходящий звонок через FreePBX
exten => _X.,1,NoOp(=== ИСХОДЯЩИЙ ЗВОНОК ГО-ЧС ===)
 same => n,Set(CHANNEL(language)=ru)
 same => n,Set(DESTINATION=${EXTEN})
 same => n,Set(CALLER_ID_NAME=ГО-ЧС Информирование)
 same => n,Set(CALLER_ID_NUM=${GOCHS_CALLERID})
 
 ; Определение типа номера
 same => n,Gosub(gochs-outbound-normalize,s,1(${DESTINATION}))
 same => n,Set(DESTINATION=${GOSUB_RETVAL})
 
 ; Проверка номера
 same => n,Gosub(gochs-outbound-validate,s,1(${DESTINATION}))
 same => n,GotoIf($[${GOSUB_RETVAL} = 0]?invalid-number)
 
 ; Выбор маршрута
 same => n,Gosub(gochs-outbound-route,s,1(${DESTINATION}))
 same => n,Set(TRUNK=${GOSUB_RETVAL})
 
 ; Логирование
 same => n,NoOp(Исходящий на ${DESTINATION} через ${TRUNK})
 same => n,UserEvent(OutboundCall,Destination: ${DESTINATION},Trunk: ${TRUNK},CallerID: ${CALLER_ID_NUM})
 
 ; Проверка лимитов каналов
 same => n,Gosub(gochs-outbound-channels,s,1(${TRUNK}))
 same => n,GotoIf($[${GOSUB_RETVAL} = 0]?congestion)
 
 ; Выполнение звонка
 same => n,Gosub(gochs-outbound-dial,s,1(${DESTINATION},${TRUNK}))
 
 ; Обработка результата
 same => n,Goto(result-${DIALSTATUS})
 
 ; =====================================================
 ; ОБРАБОТКА РЕЗУЛЬТАТОВ ЗВОНКА
 ; =====================================================
 
 same => n(result-ANSWER),NoOp(Звонок отвечен)
 same => n,Set(CALL_STATUS=answered)
 same => n,Set(ANSWER_TIME=${EPOCH})
 same => n,Goto(call-success)
 
 same => n(result-BUSY),NoOp(Занято)
 same => n,Set(CALL_STATUS=busy)
 same => n,Goto(call-failed)
 
 same => n(result-NOANSWER),NoOp(Нет ответа)
 same => n,Set(CALL_STATUS=noanswer)
 same => n,Goto(call-failed)
 
 same => n(result-CONGESTION),NoOp(Перегрузка)
 same => n,Set(CALL_STATUS=congestion)
 same => n,Goto(call-failed)
 
 same => n(result-CHANUNAVAIL),NoOp(Канал недоступен)
 same => n,Set(CALL_STATUS=unavailable)
 same => n,Goto(call-failed)
 
 same => n(result-CANCEL),NoOp(Отменен)
 same => n,Set(CALL_STATUS=cancelled)
 same => n,Goto(call-failed)
 
 same => n(_),NoOp(Другой статус: ${DIALSTATUS})
 same => n,Set(CALL_STATUS=failed)
 same => n,Goto(call-failed)
 
 ; =====================================================
 ; УСПЕШНЫЙ ЗВОНОК
 ; =====================================================
 
 same => n(call-success),NoOp(Звонок успешен)
 same => n,Set(CALL_DURATION=$[${EPOCH} - ${ANSWER_TIME}])
 same => n,UserEvent(CallSuccess,Destination: ${DESTINATION},Duration: ${CALL_DURATION})
 
 ; Воспроизведение сценария (если задан)
 same => n,GotoIf($[${ISNULL(${SCENARIO_ID})}]?skip-scenario)
 same => n,Gosub(gochs-outbound-scenario,s,1(${SCENARIO_ID}))
 
 same => n(skip-scenario),NoOp(Сценарий не задан)
 
 ; Сохранение статистики
 same => n,Gosub(gochs-outbound-stats,s,1(success,${CALL_DURATION}))
 
 same => n,Return(0)
 
 ; =====================================================
 ; НЕУДАЧНЫЙ ЗВОНОК
 ; =====================================================
 
 same => n(call-failed),NoOp(Звонок неудачен: ${CALL_STATUS})
 same => n,UserEvent(CallFailed,Destination: ${DESTINATION},Status: ${CALL_STATUS})
 
 ; Проверка необходимости повтора
 same => n,GotoIf($[${RETRY_ENABLED} = 1]?check-retry)
 same => n,Goto(skip-retry)
 
 same => n(check-retry),NoOp(Проверка повтора)
 same => n,Gosub(gochs-outbound-retry,s,1(${DESTINATION},${CALL_STATUS}))
 
 same => n(skip-retry),NoOp(Пропуск повтора)
 
 ; Сохранение статистики
 same => n,Gosub(gochs-outbound-stats,s,1(failed,0))
 
 same => n,Return(1)
 
 ; =====================================================
 ; ОШИБКИ
 ; =====================================================
 
 same => n(invalid-number),NoOp(Неверный номер: ${DESTINATION})
 same => n,Set(CALL_STATUS=invalid)
 same => n,UserEvent(CallInvalid,Destination: ${DESTINATION})
 same => n,Return(2)
 
 same => n(congestion),NoOp(Все каналы заняты)
 same => n,Set(CALL_STATUS=congestion)
 same => n,UserEvent(CallCongestion,Trunk: ${TRUNK})
 same => n,Congestion(10)
 same => n,Return(3)


[gochs-outbound-normalize]
; =====================================================
; НОРМАЛИЗАЦИЯ НОМЕРА
; =====================================================

exten => s,1,NoOp(Нормализация номера: ${ARG1})
 same => n,Set(NUMBER=${ARG1})
 
 ; Удаление всех нецифровых символов
 same => n,Set(NUMBER=${FILTER(0-9,${NUMBER})})
 
 ; Внутренний номер (3-4 цифры)
 same => n,GotoIf($[${LEN(${NUMBER})} <= 4]?internal)
 
 ; Мобильный номер (11 цифр, начинается с 7 или 8)
 same => n,GotoIf($[${NUMBER:0:1} = 8]?mobile-8)
 same => n,GotoIf($[${NUMBER:0:1} = 7]?mobile-7)
 same => n,GotoIf($[${LEN(${NUMBER})} = 10]?mobile-10)
 
 ; Городской номер
 same => n,Goto(city)
 
 ; Внутренний номер
 same => n(internal),NoOp(Внутренний номер: ${NUMBER})
 same => n,Return(${NUMBER})
 
 ; Мобильный с 8
 same => n(mobile-8),Set(NUMBER=7${NUMBER:1})
 same => n,Return(${NUMBER})
 
 ; Мобильный с 7
 same => n(mobile-7),Return(${NUMBER})
 
 ; Мобильный 10 цифр
 same => n(mobile-10),Set(NUMBER=7${NUMBER})
 same => n,Return(${NUMBER})
 
 ; Городской номер
 same => n(city),NoOp(Городской номер: ${NUMBER})
 same => n,Return(${NUMBER})


[gochs-outbound-validate]
; =====================================================
; ПРОВЕРКА ВАЛИДНОСТИ НОМЕРА
; =====================================================

exten => s,1,NoOp(Проверка номера: ${ARG1})
 same => n,Set(NUMBER=${ARG1})
 
 ; Проверка длины
 same => n,GotoIf($[${LEN(${NUMBER})} < 3]?invalid)
 same => n,GotoIf($[${LEN(${NUMBER})} > 15]?invalid)
 
 ; Проверка внутреннего номера
 same => n,GotoIf($[${LEN(${NUMBER})} <= 4]?check-internal)
 
 ; Проверка мобильного
 same => n,GotoIf($[${NUMBER:0:1} = 7]?check-mobile)
 
 ; Проверка городского
 same => n,Goto(check-city)
 
 same => n(check-internal),NoOp(Проверка внутреннего)
 same => n,Set(VALID=${SHELL(grep -c "^${NUMBER}$" ${GOCHS_BASE}/config/internal_numbers.txt)})
 same => n,GotoIf($[${VALID} > 0]?valid)
 same => n,Goto(invalid)
 
 same => n(check-mobile),NoOp(Проверка мобильного)
 same => n,GotoIf($[${LEN(${NUMBER})} = 11]?valid)
 same => n,Goto(invalid)
 
 same => n(check-city),NoOp(Проверка городского)
 same => n,GotoIf($[${LEN(${NUMBER})} >= 5]?valid)
 same => n,Goto(invalid)
 
 same => n(valid),Return(1)
 same => n(invalid),Return(0)


[gochs-outbound-route]
; =====================================================
; ВЫБОР МАРШРУТА ДЛЯ ЗВОНКА
; =====================================================

exten => s,1,NoOp(Выбор маршрута для: ${ARG1})
 same => n,Set(NUMBER=${ARG1})
 
 ; Внутренний номер
 same => n,GotoIf($[${LEN(${NUMBER})} <= 4]?internal)
 
 ; Мобильный номер
 same => n,GotoIf($[${NUMBER:0:1} = 7]?mobile)
 
 ; Междугородний
 same => n,GotoIf($[${NUMBER:0:3} = 7495]?local)
 same => n,GotoIf($[${NUMBER:0:3} = 7499]?local)
 same => n,Goto(long-distance)
 
 same => n(internal),NoOp(Внутренний маршрут)
 same => n,Return(freepbx-internal)
 
 same => n(mobile),NoOp(Мобильный маршрут)
 same => n,Return(freepbx-mobile)
 
 same => n(local),NoOp(Местный маршрут)
 same => n,Return(freepbx-local)
 
 same => n(long-distance),NoOp(Междугородний маршрут)
 same => n,Return(freepbx-ld)


[gochs-outbound-channels]
; =====================================================
; ПРОВЕРКА ДОСТУПНЫХ КАНАЛОВ
; =====================================================

exten => s,1,NoOp(Проверка каналов для: ${ARG1})
 same => n,Set(TRUNK=${ARG1})
 
 ; Получение текущего количества каналов
 same => n,Set(CURRENT_CHANNELS=${SHELL(asterisk -rx "core show channels count" | grep "active channels" | awk '{print $1}')})
 
 ; Получение лимита для транка
 same => n,Set(MAX_CHANNELS=${SHELL(grep "^${TRUNK}=" ${GOCHS_BASE}/config/trunk_limits.txt | cut -d'=' -f2)})
 same => n,GotoIf($[${ISNULL(${MAX_CHANNELS})}]?default-limit)
 same => n,Goto(check)
 
 same => n(default-limit),Set(MAX_CHANNELS=${MAX_CONCURRENT_CALLS})
 
 same => n(check),NoOp(Каналов: ${CURRENT_CHANNELS} из ${MAX_CHANNELS})
 same => n,GotoIf($[${CURRENT_CHANNELS} >= ${MAX_CHANNELS}]?no-channels)
 same => n,Return(1)
 
 same => n(no-channels),NoOp(Нет свободных каналов)
 same => n,Return(0)


[gochs-outbound-dial]
; =====================================================
; ВЫПОЛНЕНИЕ ЗВОНКА
; =====================================================

exten => s,1,NoOp(Набор номера: ${ARG1} через ${ARG2})
 same => n,Set(DESTINATION=${ARG1})
 same => n,Set(TRUNK=${ARG2})
 
 ; Установка Caller ID
 same => n,Set(CALLERID(all)=${CALLER_ID_NAME} <${CALLER_ID_NUM}>)
 
 ; Установка таймаутов
 same => n,Set(TIMEOUT_DIAL=${DIAL_TIMEOUT})
 
 ; Опции дозвона
 same => n,Set(DIAL_OPTIONS=)
 same => n,Set(DIAL_OPTIONS=${DIAL_OPTIONS}M(gochs-answer^${SCENARIO_ID}))
 same => n,Set(DIAL_OPTIONS=${DIAL_OPTIONS}g)
 same => n,Set(DIAL_OPTIONS=${DIAL_OPTIONS}w)
 same => n,Set(DIAL_OPTIONS=${DIAL_OPTIONS}W)
 
 ; Выполнение звонка
 same => n,Dial(PJSIP/${DESTINATION}@${TRUNK},${TIMEOUT_DIAL},${DIAL_OPTIONS})
 
 same => n,Return()


[gochs-outbound-scenario]
; =====================================================
; ВОСПРОИЗВЕДЕНИЕ СЦЕНАРИЯ ПОСЛЕ ОТВЕТА
; =====================================================

exten => s,1,NoOp(Воспроизведение сценария: ${ARG1})
 same => n,Set(SCENARIO_ID=${ARG1})
 same => n,Set(SCENARIO_FILE=${GOCHS_VOICE}/scenario_${SCENARIO_ID})
 
 ; Ожидание после ответа
 same => n,Wait(1)
 
 ; Определение типа файла и воспроизведение
 same => n,GotoIf($[${STAT(e,${SCENARIO_FILE}.wav)}]?play-wav)
 same => n,GotoIf($[${STAT(e,${SCENARIO_FILE}.mp3)}]?play-mp3)
 same => n,GotoIf($[${STAT(e,${SCENARIO_FILE}.ulaw)}]?play-ulaw)
 
 ; Если файл не найден, пытаемся сгенерировать
 same => n,Goto(generate)
 
 same => n(play-wav),Playback(${SCENARIO_FILE})
 same => n,Goto(done)
 
 same => n(play-mp3),MP3Player(${SCENARIO_FILE}.mp3)
 same => n,Goto(done)
 
 same => n(play-ulaw),Playback(${SCENARIO_FILE})
 same => n,Goto(done)
 
 same => n(generate),NoOp(Генерация сценария)
 same => n,System(${GOCHS_BASE}/scripts/generate_scenario.sh ${SCENARIO_ID})
 same => n,Playback(${SCENARIO_FILE})
 
 same => n(done),NoOp(Воспроизведение завершено)
 
 ; Ожидание подтверждения (опционально)
 same => n,GotoIf($[${SCENARIO_CONFIRM} = 1]?confirm)
 same => n,Goto(end)
 
 same => n(confirm),NoOp(Ожидание подтверждения)
 same => n,Playback(confirm-message)
 same => n,WaitExten(5)
 
 same => n(end),Return()


[gochs-outbound-retry]
; =====================================================
; ОБРАБОТКА ПОВТОРНЫХ ЗВОНКОВ
; =====================================================

exten => s,1,NoOp(Проверка повтора для: ${ARG1})
 same => n,Set(DESTINATION=${ARG1})
 same => n,Set(STATUS=${ARG2})
 same => n,Set(RETRY_COUNT=${RETRY_COUNT})
 
 ; Проверка необходимости повтора
 same => n,GotoIf($[${RETRY_COUNT} >= ${MAX_RETRY_ATTEMPTS}]?max-retries)
 
 ; Проверка статуса (повторять только для определенных)
 same => n,GotoIf($["${STATUS}" = "busy"]?do-retry)
 same => n,GotoIf($["${STATUS}" = "noanswer"]?do-retry)
 same => n,GotoIf($["${STATUS}" = "congestion"]?do-retry)
 same => n,GotoIf($["${STATUS}" = "unavailable"]?do-retry)
 same => n,Goto(skip-retry)
 
 same => n(do-retry),NoOp(Добавление в очередь повторов)
 same => n,Set(NEW_RETRY_COUNT=$[${RETRY_COUNT} + 1])
 same => n,Set(RETRY_TIME=$[${EPOCH} + ${RETRY_INTERVAL} * ${RETRY_MULTIPLIER} ^ ${RETRY_COUNT}])
 
 ; Сохранение в Redis для отложенного звонка
 same => n,Set(REDIS_DATA={"destination":"${DESTINATION}","retry_count":${NEW_RETRY_COUNT},"scheduled":${RETRY_TIME}})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} ZADD gochs:retry_queue ${RETRY_TIME} '${REDIS_DATA}')
 
 same => n,UserEvent(CallRetryScheduled,Destination: ${DESTINATION},RetryCount: ${NEW_RETRY_COUNT},ScheduledTime: ${RETRY_TIME})
 
 same => n(skip-retry),Return()
 
 same => n(max-retries),NoOp(Достигнут максимум повторов)
 same => n,UserEvent(CallRetryMaxReached,Destination: ${DESTINATION},MaxRetries: ${MAX_RETRY_ATTEMPTS})
 same => n,Return()


[gochs-outbound-stats]
; =====================================================
; СБОР СТАТИСТИКИ ИСХОДЯЩИХ ЗВОНКОВ
; =====================================================

exten => s,1,NoOp(Сохранение статистики)
 same => n,Set(STATUS=${ARG1})
 same => n,Set(DURATION=${ARG2})
 same => n,Set(TODAY=${STRFTIME(${EPOCH},,%Y%m%d)})
 same => n,Set(HOUR=${STRFTIME(${EPOCH},,%H)})
 
 ; Инкремент счетчиков
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:stats:outbound:total:${TODAY})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:stats:outbound:${STATUS}:${TODAY})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:stats:outbound:hour:${TODAY}:${HOUR})
 
 ; Длительность (только для успешных)
 same => n,GotoIf($[${DURATION} > 0]?add-duration)
 same => n,Return()
 
 same => n(add-duration),NoOp(Добавление длительности)
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCRBY gochs:stats:outbound:duration:${TODAY} ${DURATION})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:stats:outbound:calls:${TODAY})
 
 same => n,Return()


[gochs-outbound-campaign]
; =====================================================
; МАССОВЫЙ ОБЗВОН (КАМПАНИИ)
; =====================================================

exten => start,1,NoOp(=== ЗАПУСК КАМПАНИИ ===)
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 
 ; Загрузка контактов из Redis
 same => n,Set(CONTACTS=${SHELL(redis-cli -a ${REDIS_PASSWORD} LRANGE gochs:campaign:${CAMPAIGN_ID}:contacts 0 -1)})
 
 ; Запуск обзвона
 same => n,Gosub(gochs-outbound-campaign-dialer,s,1(${CAMPAIGN_ID},${SCENARIO_ID}))
 
 same => n,Return()

exten => dial,1,NoOp(Набор контакта)
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(CONTACT_ID=${ARG2})
 same => n,Set(PHONE=${ARG3})
 same => n,Set(SCENARIO_ID=${ARG4})
 
 ; Нормализация номера
 same => n,Gosub(gochs-outbound-normalize,s,1(${PHONE}))
 same => n,Set(PHONE=${GOSUB_RETVAL})
 
 ; Установка переменных кампании
 same => n,Set(RETRY_ENABLED=1)
 same => n,Set(RETRY_COUNT=0)
 
 ; Выполнение звонка
 same => n,Gosub(gochs-outbound-main,${PHONE},1)
 
 ; Сохранение результата в Redis
 same => n,Set(RESULT_DATA={"contact_id":"${CONTACT_ID}","phone":"${PHONE}","status":"${CALL_STATUS}","duration":${CALL_DURATION},"timestamp":${EPOCH}})
 same => n,System(redis-cli -a ${REDIS_PASSWORD} RPUSH gochs:campaign:${CAMPAIGN_ID}:results '${RESULT_DATA}')
 
 ; Отправка события
 same => n,UserEvent(CampaignCallComplete,CampaignID: ${CAMPAIGN_ID},ContactID: ${CONTACT_ID},Status: ${CALL_STATUS})
 
 same => n,Return(${GOSUB_RETVAL})


[gochs-outbound-campaign-dialer]
; =====================================================
; ДИАЛЕР КАМПАНИИ (УПРАВЛЕНИЕ ОЧЕРЕДЬЮ)
; =====================================================

exten => s,1,NoOp(Запуск диалера для кампании ${ARG1})
 same => n,Set(CAMPAIGN_ID=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 same => n,Set(CALL_COUNT=0)
 
 ; Проверка статуса кампании
 same => n,Set(CAMPAIGN_STATUS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:status)})
 same => n,GotoIf($["${CAMPAIGN_STATUS}" = "stopped"]?campaign-stopped)
 same => n,GotoIf($["${CAMPAIGN_STATUS}" = "paused"]?campaign-paused)
 
 ; Получение следующего контакта
 same => n(dial-loop),NoOp(Цикл набора)
 same => n,Set(CONTACT=${SHELL(redis-cli -a ${REDIS_PASSWORD} LPOP gochs:campaign:${CAMPAIGN_ID}:queue)})
 same => n,GotoIf($[${ISNULL(${CONTACT})}]?queue-empty)
 
 ; Парсинг контакта
 same => n,Set(CONTACT_ID=${CUT(CONTACT,\|,1)})
 same => n,Set(PHONE=${CUT(CONTACT,\|,2)})
 same => n,Set(NAME=${CUT(CONTACT,\|,3)})
 
 ; Проверка лимита каналов
 same => n,Set(ACTIVE_CALLS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:active_calls)})
 same => n,GotoIf($[${ACTIVE_CALLS} >= ${MAX_CHANNELS_PER_CAMPAIGN}]?wait-channels)
 
 ; Запуск звонка в фоне
 same => n,Set(CALL_COUNT=$[${CALL_COUNT} + 1])
 same => n,System(redis-cli -a ${REDIS_PASSWORD} INCR gochs:campaign:${CAMPAIGN_ID}:active_calls)
 same => n,Originate(PJSIP/${PHONE}@freepbx-outbound,exten,gochs-outbound-campaign,dial,${CAMPAIGN_ID},${CONTACT_ID},${PHONE},${SCENARIO_ID},60,a)
 
 ; Пауза между звонками
 same => n,Wait(0.5)
 
 ; Продолжение цикла
 same => n,Goto(dial-loop)
 
 same => n(wait-channels),NoOp(Ожидание освобождения каналов)
 same => n,Wait(1)
 same => n,Goto(dial-loop)
 
 same => n(queue-empty),NoOp(Очередь пуста)
 same => n,Wait(5)
 same => n,Goto(check-retry)
 
 same => n(check-retry),NoOp(Проверка очереди повторов)
 same => n,Set(RETRY_COUNT=${SHELL(redis-cli -a ${REDIS_PASSWORD} LLEN gochs:campaign:${CAMPAIGN_ID}:retry)})
 same => n,GotoIf($[${RETRY_COUNT} > 0]?process-retry)
 same => n,Goto(campaign-complete)
 
 same => n(process-retry),NoOp(Обработка повторов)
 same => n,Set(NOW=${EPOCH})
 same => n,Set(RETRY_ITEM=${SHELL(redis-cli -a ${REDIS_PASSWORD} ZRANGEBYSCORE gochs:campaign:${CAMPAIGN_ID}:retry_queue 0 ${NOW} LIMIT 0 1)})
 same => n,GotoIf($[${ISNULL(${RETRY_ITEM})}]?campaign-complete)
 
 ; Перемещение из очереди повторов в основную
 same => n,System(redis-cli -a ${REDIS_PASSWORD} ZREM gochs:campaign:${CAMPAIGN_ID}:retry_queue '${RETRY_ITEM}')
 same => n,System(redis-cli -a ${REDIS_PASSWORD} RPUSH gochs:campaign:${CAMPAIGN_ID}:queue '${RETRY_ITEM}')
 same => n,Goto(dial-loop)
 
 same => n(campaign-paused),NoOp(Кампания на паузе)
 same => n,Wait(5)
 same => n,Goto(s,1)
 
 same => n(campaign-stopped),NoOp(Кампания остановлена)
 same => n,UserEvent(CampaignStopped,CampaignID: ${CAMPAIGN_ID})
 same => n,Return()
 
 same => n(campaign-complete),NoOp(Кампания завершена)
 same => n,Set(ACTIVE_CALLS=${SHELL(redis-cli -a ${REDIS_PASSWORD} GET gochs:campaign:${CAMPAIGN_ID}:active_calls)})
 same => n,GotoIf($[${ACTIVE_CALLS} > 0]?wait-completion)
 
 same => n,System(redis-cli -a ${REDIS_PASSWORD} SET gochs:campaign:${CAMPAIGN_ID}:status completed)
 same => n,UserEvent(CampaignCompleted,CampaignID: ${CAMPAIGN_ID},TotalCalls: ${CALL_COUNT})
 same => n,Return()
 
 same => n(wait-completion),NoOp(Ожидание завершения активных звонков)
 same => n,Wait(3)
 same => n,Goto(campaign-complete)


[gochs-outbound-api]
; =====================================================
; API ДЛЯ ИСХОДЯЩИХ ЗВОНКОВ
; =====================================================

exten => originate,1,NoOp(=== API ORIGINATE ===)
 same => n,Set(DESTINATION=${ARG1})
 same => n,Set(SCENARIO_ID=${ARG2})
 same => n,Set(CALLER_ID=${ARG3})
 
 ; Установка Caller ID если задан
 same => n,GotoIf($[${ISNULL(${CALLER_ID})}]?default-callerid)
 same => n,Set(CALLER_ID_NUM=${CALLER_ID})
 same => n,Goto(dial)
 
 same => n(default-callerid),Set(CALLER_ID_NUM=${GOCHS_CALLERID})
 
 same => n(dial),NoOp(Запуск звонка)
 same => n,Originate(PJSIP/${DESTINATION}@freepbx-outbound,exten,gochs-outbound-main,${DESTINATION},${SCENARIO_ID},60)
 
 same => n,Return(${ORIGINATE_STATUS})

exten => status,1,NoOp(=== API STATUS ===)
 same => n,Set(CHANNEL=${ARG1})
 same => n,ChannelStatus(${CHANNEL})
 same => n,Return(${CHANNEL_STATUS})

exten => hangup,1,NoOp(=== API HANGUP ===)
 same => n,Set(CHANNEL=${ARG1})
 same => n,SoftHangup(${CHANNEL})
 same => n,Return(SUCCESS)

exten => channels,1,NoOp(=== API CHANNELS ===)
 same => n,CoreShowChannels()
 same => n,Return()


