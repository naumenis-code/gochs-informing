; =====================================================
; Логирование Asterisk
; =====================================================

[general]
dateformat = %F %T.%q
queue_log = yes
exec_after_rotate = gzip -9 ${filename}.2

[logfiles]
; Основные логи
console => notice,warning,error
messages => notice,warning,error,verbose(3)
full => notice,warning,error,debug,verbose(9),dtmf,fax

; Безопасность
security => security

; Специфичные логи ГО-ЧС
gochs => notice,warning,error,call,event

[gochs]
file = /var/log/asterisk/gochs
levels = notice,warning,error,call,event,dtmf,fax
format = [${timestamp}] ${verbosity} ${filename}:${line} ${function} - ${message}

; Логи CDR (Call Detail Records)
cdr-csv => csv
cdr-custom => custom

[cdr]
file = /var/log/asterisk/cdr
levels = cdr
format = ${CDR(clid)}","${CDR(src)}","${CDR(dst)}","${CDR(dcontext)}","${CDR(channel)}","${CDR(dstchannel)}","${CDR(lastapp)}","${CDR(lastdata)}","${CDR(start)}","${CDR(answer)}","${CDR(end)}","${CDR(duration)}","${CDR(billsec)}","${CDR(disposition)}","${CDR(amaflags)}","${CDR(accountcode)}","${CDR(uniqueid)}","${CDR(userfield)}
