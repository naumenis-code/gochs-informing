; =====================================================
; AMI (Asterisk Manager Interface)
; =====================================================

[general]
enabled = yes
port = 5038
bindaddr = 127.0.0.1
displayconnects = yes
timestampevents = yes
webenabled = yes
httptimeout = 60
authlimit = 5
authlimittime = 300

; Учетные данные для ГО-ЧС
[gochs_ami]
secret = {{ASTERISK_AMI_PASSWORD}}
deny = 0.0.0.0/0.0.0.0
permit = 127.0.0.1/255.255.255.255
read = system,call,log,verbose,command,agent,user,config,dtmf,reporting,cdr,dialplan,originate
write = system,call,log,verbose,command,agent,user,config,dtmf,reporting,cdr,dialplan,originate
eventfilter = Event: Newchannel
eventfilter = Event: Hangup
eventfilter = Event: Dial
eventfilter = Event: Bridge
eventfilter = Event: VarSet
eventfilter = Event: UserEvent

; Администраторский доступ (только localhost)
[admin]
secret = {{ASTERISK_ADMIN_PASSWORD}}
deny = 0.0.0.0/0.0.0.0
permit = 127.0.0.1/255.255.255.255
read = all
write = all

; Мониторинг (только чтение)
[monitor]
secret = {{ASTERISK_MONITOR_PASSWORD}}
deny = 0.0.0.0/0.0.0.0
permit = 127.0.0.1/255.255.255.255
read = system,call,log,verbose,command,agent,user,dtmf,reporting,cdr,dialplan
write = 
