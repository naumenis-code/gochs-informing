; =====================================================
; RTP (Real-time Transport Protocol)
; =====================================================

[general]
; Диапазон портов для RTP
rtpstart = 10000
rtpend = 20000

; Настройки
rtpchecksums = no
dtmftimeout = 3000
rtp_hold_timeout = 300
rtp_keepalive = 30
strictrtp = yes
probation = 2
icesupport = no

; ICE (если нужен NAT traversal)
icesupport = no
stunaddr = 

; Качество обслуживания
tos_audio = ef
tos_video = af41
cos_audio = 5
cos_video = 4
